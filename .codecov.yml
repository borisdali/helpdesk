coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%

ignore:
  # Binary entrypoints — glue code, not library logic
  - "cmd/**"
  # Agent startup/wiring code — same category as cmd/
  - "agents/database/main.go"
  - "agents/k8s/main.go"
  - "agents/sysadmin/main.go"
  - "agents/research/main.go"
  - "agents/incident/main.go"
  # agentutil/serve — server wiring extracted from agentutil during the v0.20.0 split;
  # Serve/ServeWithTracing/InitApprovalClient require a live process to exercise.
  - "agentutil/serve/**"
  # Pure HTTP client wrappers — require a live auditd server to test
  - "internal/audit/approval_client.go"
  - "internal/audit/remote_store.go"
  # Test infrastructure and helpers — not self-tested by design
  - "testing/**"
  # Embedded assets with no executable statements
  - "playbooks/**"
  - "prompts/**"

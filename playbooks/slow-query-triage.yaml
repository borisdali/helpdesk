series_id: pbs_slow_query_triage
name: Slow Query Triage
version: "1.5"
entry_point: true
execution_mode: agent
agent_name: postgres_database_agent
approval_mode: manual
problem_class: performance
author: aiHelpDesk
# Allow-list of same-domain follow-on playbooks (TRANSITION_TO targets).
# The gateway validates emitted TRANSITION_TO directives against this list and
# coerces anything outside it to requires_operator_approval — preventing the
# model from inventing playbook names. No cross-domain escalations declared.
transitions_to:
  - pbs_slow_query_remediate
  - pbs_lock_chain_remediate
description: |
  Investigate slow query performance on the target database. Identify the top
  queries by execution time, examine current wait events, detect blocking chains,
  and optionally run EXPLAIN ANALYZE on the most expensive query.
symptoms:
  - "p99 or p95 latency elevated"
  - "application timeouts increasing"
  - "query time > 1s in application logs"
  - "pg_stat_statements showing high mean_exec_time"
  - "users reporting slow page loads"
guidance: |
  Begin with get_slow_queries (limit=10) to identify the worst offenders by
  total_exec_time. Focus on queries with high mean_exec_time AND high calls —
  a slow query called 10,000 times per hour has more impact than one called once.

  Check get_wait_events to see if the database is currently blocked on I/O,
  locks, or IPC. A sudden spike in Lock wait events points to a blocking chain;
  use get_blocking_queries to identify the blocker.

  If pg_stat_statements is not installed, the investigation is limited — note this
  as a gap and recommend installing the extension.

  For the single most expensive query, use explain_query (allow_dml=false) to get
  the execution plan. Look for: sequential scans on large tables, nested loops with
  high row estimates, missing index conditions.

  Common misdiagnoses: blaming a slow query that is actually waiting for a lock
  held by a separate long-running transaction — always check blocking chains first.

  Final step: after your analysis, output exactly these lines in this format
  (no markdown, no extra text on each line):
  HYPOTHESIS_1: <primary hypothesis> | CONFIDENCE: <0.0–1.0> | EVIDENCE: "<verbatim quote from tool output>"
  HYPOTHESIS_2: <alternative if considered> | CONFIDENCE: <0.0–1.0> | REJECTED: <one-sentence reason why ruled out>
  ROOT_CAUSE: HYPOTHESIS_1
  FINDINGS: top query queryid=<id> mean_exec_time=<N>ms calls=<N>/hr; wait_event=<type | none>; lock_contention=<true|false>; recommended=<add_index|cancel_query|escalate|monitor>

  Then emit EXACTLY ONE next-playbook directive on its own line. The series_id
  MUST be copied verbatim from one of the three options below — do NOT invent
  or paraphrase a playbook name.

  Selection rule:
    - If the issue is a single slow query (plan inefficiency, missing index,
      expensive query) and no blocking chain is involved, choose slow-query remediate.
    - If lock_contention=true AND get_blocking_queries returned a non-empty
      chain, choose lock-chain remediate.
    - If neither cleanly applies (ambiguous diagnosis, or the destructive action
      requires human judgment), escalate for operator approval.

  Emit exactly one of these three lines, with nothing else on the line:
  TRANSITION_TO: pbs_slow_query_remediate
  TRANSITION_TO: pbs_lock_chain_remediate
  ESCALATE_TO: requires_operator_approval
escalation:
  - "mean_exec_time > 10s for any query with calls > 100/hour"
  - "blocking chain involves a transaction open > 10 minutes"
  - "sequential scan on a table > 10GB with no index candidate"
target_hints: []

series_id: pbs_cache_miss_remediate
name: High Cache Miss Ratio — Remediation
version: "1.0"
entry_point: false
execution_mode: agent_approve
agent_name: postgres_database_agent
approval_mode: manual
problem_class: performance
author: aiHelpDesk
description: |
  Confirm the cache miss condition is still active, verify the shared_buffers
  configuration, check whether pg_prewarm is available, and report a concrete
  remediation recommendation to the operator.
  This playbook cannot resize shared_buffers (that requires a PostgreSQL restart
  and must be scheduled in a maintenance window), but it gathers the evidence
  needed for the operator to act.
symptoms:
  - "high cache miss ratio confirmed by triage"
  - "large seqscan table identified as evicting hot pages"
  - "shared_buffers confirmed undersized"
guidance: |
  Step 1: Confirm the current state. Call get_database_stats to retrieve current
  blks_hit and blks_read. If the cache hit ratio has recovered to >= 0.99
  without any action, state this and declare the remediation complete — no
  further steps are needed.

  Step 2: Call get_config_parameter with name="shared_buffers" to confirm the
  current shared_buffers value. This verifies the triage finding and ensures
  the value has not been changed since triage ran.

  Step 3: Call get_extensions to check whether the pg_prewarm extension is
  installed. pg_prewarm can be used to pre-load hot tables into the buffer pool
  as temporary relief after a restart, but the fundamental fix is increasing
  shared_buffers.

  Step 4: Based on the results above and the triage findings, report to the
  operator:
  - Current cache hit ratio (from Step 1) vs. the triage value
  - Current shared_buffers value (from Step 2) and the recommended value
    (at least 25% of total RAM, or enough to hold the working set)
  - Whether pg_prewarm is available for temporary relief (from Step 3)
  - Whether a specific large table was identified as the sequential-scan driver
    (from triage findings: largest_seqscan_table)
  - That changing shared_buffers requires editing postgresql.conf and performing
    a controlled PostgreSQL restart — this must be scheduled as a maintenance
    window action and cannot be performed by this playbook
  Then declare the playbook complete.
escalation:
  - "shared_buffers needs to be increased — this requires a PostgreSQL restart and must be scheduled in a maintenance window"
target_hints: []

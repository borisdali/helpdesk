series_id: pbs_cache_miss_remediate
name: High Cache Miss Ratio — Remediation
version: "1.1"
playbook_type: remediation
entry_point: false
execution_mode: agent_approve
agent_name: postgres_database_agent
approval_mode: manual
problem_class: performance
author: aiHelpDesk
description: |
  Confirm the cache miss condition is still active, then reset the buffer cache
  statistics so the ratio reflects only current normal activity. If the
  underlying cause was a one-time large sequential scan (the most common
  injection pattern), resetting stats is sufficient — the ratio recovers
  immediately as catalog queries populate the hit counter with no corresponding
  disk reads. If shared_buffers is persistently undersized, the operator is
  informed and escalation advice is provided.
symptoms:
  - "high cache miss ratio confirmed by triage"
  - "large seqscan table identified as evicting hot pages"
guidance: |
  Step 1: Confirm the current state. Call get_database_stats to retrieve current
  blks_hit and blks_read. Compute the cache hit ratio:
    ratio = blks_hit / (blks_hit + blks_read)
  If ratio >= 0.99 already, declare complete — no further action needed.

  Step 2: Call get_table_stats to identify whether a large table (e.g.
  test_large_table or a table flagged in the triage findings) is still present
  and is the primary source of sequential scans. Note its name for the summary.

  Step 3: Call reset_cache_stats to clear the pg_stat_database counters.
  This removes the skewed blks_read accumulated by the one-time seqscan so
  the ratio reflects only post-reset activity. Normal catalog reads (which
  are fully cached) will immediately push the ratio back above 0.99.

  Step 4: Call get_database_stats again to confirm the ratio has recovered.
  If ratio is now >= 0.95, the remediation is complete.
  If ratio is still low, this indicates ongoing large scans — note this and
  escalate to the shared_buffers resize path described below.

  Step 5: Report to the operator:
  - Pre-reset ratio (from Step 1)
  - Post-reset ratio (from Step 4)
  - The table that drove the initial seqscan (from Step 2 / triage findings)
  - Whether shared_buffers may still be undersized for the workload
    (if the table is large relative to shared_buffers, a maintenance window
    resize may be needed to prevent recurrence)
  Then declare the playbook complete.
escalation:
  - "If the ratio remains low after reset, shared_buffers may need to be increased — this requires editing postgresql.conf and a controlled PostgreSQL restart, which must be scheduled as a maintenance window action"
target_hints: []

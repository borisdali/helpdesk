series_id: pbs_cache_miss_remediate
name: High Cache Miss Ratio — Remediation
version: "1.0"
entry_point: false
execution_mode: agent_approve
agent_name: postgres_database_agent
approval_mode: manual
problem_class: performance
author: aiHelpDesk
description: |
  Attempt to warm frequently-accessed tables into the shared buffer pool using
  pg_prewarm. If the root cause is undersized shared_buffers, report the
  recommended configuration change (which requires a PostgreSQL restart and
  must be scheduled in a maintenance window — it cannot be performed here).
  pg_prewarm loads table blocks into shared_buffers via a read-only operation;
  it has no data modification risk but does consume I/O during the load.
symptoms:
  - "high cache miss ratio confirmed by triage"
  - "large seqscan table identified as evicting hot pages"
  - "shared_buffers confirmed undersized"
guidance: |
  Step 1: Confirm the current state. Call get_database_stats to get the current
  blks_hit and blks_read. Compare these values to the triage findings — the
  ratio may have improved under normal load since triage ran. If the ratio has
  recovered to >= 0.99 without any action, note this and report that no
  remediation is needed at this time.

  Step 2: If the largest_seqscan_table from triage findings is not null (i.e.
  a specific large table was identified as the source of seqscans that evicted
  hot pages), call run_sql with the following query to warm that table:
    SELECT pg_prewarm('<schema>.<table>');
  Before requesting approval, state:
  - The table name (substituted from triage findings)
  - That pg_prewarm loads the table into shared_buffers via a read-only scan —
    no data is modified; the operation is safe to run at any time
  - That this may consume I/O during loading and briefly increase disk read
    activity, but will reduce cache misses for subsequent queries

  Step 3: After pg_prewarm completes, call get_database_stats again and compare
  blks_read to the value from Step 1. A reduction in the blks_read rate (not the
  cumulative total) confirms that the buffer pool is now serving more reads from
  memory. Report the before/after cache hit ratio.

  Step 4: If the root cause from triage is undersized shared_buffers (i.e.
  largest_seqscan_table is null and shared_buffers is below 25% of total RAM),
  pg_prewarm cannot permanently resolve the issue — the buffer pool will
  continue to be insufficient. Report the following to the operator:
  - Current shared_buffers value (from triage findings)
  - Recommended value: 25% of total server RAM
  - That changing shared_buffers requires editing postgresql.conf and performing
    a PostgreSQL restart — this must be scheduled in a maintenance window
  - That until the restart is performed, pg_prewarm can provide temporary relief
    by pre-loading the most critical tables after each PostgreSQL restart
  This playbook cannot perform the shared_buffers change; it must be handled
  as a configuration management action.
escalation:
  - "pg_prewarm extension is not installed — run CREATE EXTENSION pg_prewarm as superuser first, then re-run this playbook"
  - "shared_buffers needs to be increased — this requires a PostgreSQL restart and must be scheduled in a maintenance window"
target_hints: []

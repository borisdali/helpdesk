series_id: pbs_idle_blocker_remediate
name: Idle-in-Transaction Blocker — Terminate Root Blocker
version: "1.2"
execution_mode: agent_approve
agent_name: postgres_database_agent
approval_mode: manual
problem_class: availability
author: aiHelpDesk
description: |
  Terminate the idle-in-transaction root blocker in a lock chain. Handles both
  simple (one root, N direct victims) and multi-level chains (root → intermediate
  → leaves). Uses terminate_connection (pg_terminate_backend) — not cancel_query
  (pg_cancel_backend) — which closes the connection unconditionally and releases
  all held locks. In a multi-level chain, terminating the root triggers a cascade:
  intermediate sessions acquire their pending locks and exit, rolling back their
  own open transactions. If any intermediate session has uncommitted writes,
  that work is silently discarded — the operator must see this before approving.
symptoms:
  - "lock queue still blocking after diagnosis"
  - "idle-in-transaction session identified as root blocker"
guidance: |
  Step 1: Confirm the chain and identify all participants.
  Call get_blocking_queries. Classify each session:
    - Root: blocking_pid = NULL — the sole termination target.
    - Intermediates: have a blocking_pid AND appear as a blocker for others.
      They hold locks acquired before they became blocked. They are victims,
      not causes, but their open transactions are at risk (see Step 2).
    - Leaves: have a blocking_pid but no downstream victims.
  Record the root PID and the PID of every intermediate session.

  Step 2: Inspect root AND all intermediate sessions before acting.
  Call get_session_info on the root blocker PID. Confirm state = 'idle in
  transaction' and has_open_tx = true.
  Escalate (do NOT terminate) if root has_writes = true AND idle_secs > 1800
  (30 minutes) — uncommitted DML may be significant.

  Also call get_session_info on each intermediate session. Cascade risk:
  when the root is terminated, its lock is released and each intermediate's
  blocked query completes. The intermediate's psql (or client) then exits
  without COMMIT, rolling back its own transaction. If an intermediate has
  has_writes = true, its uncommitted work is silently discarded as a side
  effect — not because it was terminated, but because the lock it was waiting
  for finally arrived and its connection closed normally. The operator must
  be aware of this before approving the termination.

  Step 3: Terminate the root, with explicit cascade disclosure in the reason.
  Call terminate_connection on the root PID only.
  The reason field MUST include:
    - Confirmation that this is the root (blocking_pid = NULL, idle in transaction)
    - Root's has_writes status and idle_secs
    - For each intermediate with has_writes = true: "WARNING: terminating root
      will cascade to roll back session <pid> (has_writes=true, <idle_secs>s
      idle) — operator should confirm this work can be discarded before approving"
  If no intermediate has has_writes, state that explicitly: "no intermediate
  sessions have uncommitted writes; cascade rollback risk is low."
  Do NOT call cancel_query — pg_cancel_backend returns true but has no effect
  on idle-in-transaction sessions (no active query to interrupt).

  Step 4: Verify the cascade cleared.
  Call get_blocking_queries. Confirm no sessions remain in a Lock wait state
  related to the affected tables. If any Lock waits persist, a second root
  blocker may be present — repeat from Step 1.
escalation:
  - "root blocker has has_writes=true and has been idle > 30 minutes — risk of significant data loss on terminate"
  - "any intermediate session has has_writes=true and its uncommitted work is operationally significant — surface to operator and do not proceed without explicit confirmation"
  - "blocking table is a system catalog (pg_class, pg_attribute, etc.)"
  - "lock queue exceeds 20 sessions — assess blast radius before proceeding"
target_hints: []

series_id: pbs_idle_blocker_triage
name: Idle-in-Transaction Blocker Triage
version: "1.0"
execution_mode: agent
agent_name: postgres_database_agent
approval_mode: manual
problem_class: availability
author: aiHelpDesk
description: |
  Investigate sessions blocked on a lock queue where the root holder is in
  idle-in-transaction state. Identify the root blocker, assess held locks,
  and terminate it — never cancel it. pg_cancel_backend() has no effect on
  idle-in-transaction sessions: it returns true but the connection and its
  locks persist.
symptoms:
  - "queries hanging indefinitely"
  - "Lock wait events visible in pg_stat_activity"
  - "application sessions timing out on DML"
  - "pg_stat_activity shows multiple sessions in 'Lock' wait"
  - "blocking session appears idle or stuck"
guidance: |
  Step 1: Call get_blocking_queries to surface the full lock chain. The root
  blocker is the session that appears as a blocker but has no blocking_pid of
  its own. Record its PID.

  Step 2: Call get_session_info on that PID. Do not take any action until you
  have done this. Confirm: state = 'idle in transaction', has_open_tx = true,
  total_locks > 0. The locked_tables field shows exactly which objects it holds.

  Step 3: Because state = 'idle in transaction', no query is executing.
  cancel_query sends SIGINT to interrupt an active query — there is no active
  query here. The signal is delivered and ignored. cancel_query will return
  cancelled=true, but the connection stays open and all locks remain held. This
  is a false positive. Do not call cancel_query.

  Call terminate_connection on the root blocker PID. pg_terminate_backend sends
  SIGTERM, which closes the connection unconditionally and releases all held
  locks regardless of session state. After the call, verify the lock queue has
  cleared with get_blocking_queries or get_active_connections.

  Step 4: After your ROOT_CAUSE line, include an explicit RECOMMENDATION section
  that states: (a) cancel_query is ineffective here because the session is idle
  in transaction — pg_cancel_backend returns true but the connection and its
  locks persist; (b) terminate_connection is the required action because
  pg_terminate_backend closes the connection unconditionally.

  Common misdiagnosis: terminating a victim session instead of the root blocker.
  The victim will reconnect and queue again immediately. The root blocker is
  always the session with no blocking_pid.
escalation:
  - "root blocker has has_writes=true (uncommitted DML) and has been idle > 30 minutes"
  - "lock queue exceeds 20 sessions"
  - "blocking table is a system catalog (pg_class, pg_attribute, etc.)"
target_hints: []

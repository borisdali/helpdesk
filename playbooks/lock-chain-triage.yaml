series_id: pbs_lock_chain_triage
name: Transaction Lock Chain Triage
version: "1.1"
execution_mode: agent
agent_name: postgres_database_agent
approval_mode: manual
problem_class: availability
author: aiHelpDesk
description: |
  Investigate sessions blocked on a lock queue where the root holder is keeping
  an open transaction — either idle-in-transaction (connection paused after DML)
  or actively executing a long-running statement (e.g. pg_sleep, a slow query)
  that has already acquired row locks. Identify the root blocker, assess held
  locks, and determine the correct remediation action. pg_cancel_backend() is
  unreliable for root blockers: it returns true but the connection and its locks
  persist unless a query is actively executing and interruptible.
symptoms:
  - "queries hanging indefinitely"
  - "Lock wait events visible in pg_stat_activity"
  - "application sessions timing out on DML"
  - "pg_stat_activity shows multiple sessions in 'Lock' wait"
  - "blocking session appears idle or stuck"
guidance: |
  Step 1: Call get_blocking_queries to surface the full lock chain. The root
  blocker is the session that has no blocking_pid of its own (blocking_pid is
  NULL or absent). Record its PID.

  Multi-level chains: get_blocking_queries may show sessions that both have a
  blocking_pid AND appear as a blocker for other sessions. These are intermediate
  victims — they hold a lock acquired before they became blocked, and they will
  complete naturally once the root releases its lock. Do NOT terminate them.
  The root is always and only the session with blocking_pid = NULL.

  Step 2: Call get_session_info on the root blocker PID. Do not take any action
  until you have done this. Confirm: has_open_tx = true, total_locks > 0. The
  locked_tables field shows exactly which objects it holds. Check state: it may
  be 'idle in transaction' (no active query) or 'active' (executing a statement
  such as pg_sleep that holds the transaction open). Check has_writes: if true,
  terminating the session will roll back uncommitted DML.

  Step 3: The correct remediation tool is terminate_connection regardless of
  state. cancel_query is unreliable for root blockers:
  - If state = 'idle in transaction': no query is executing. SIGINT is ignored.
    cancel_query returns cancelled=true, but the connection stays open and all
    locks remain held. This is a false positive.
  - If state = 'active' (e.g. pg_sleep): SIGINT may or may not interrupt the
    statement, but the transaction — and its locks — stays open until the
    connection closes. The lock queue does not clear.
  terminate_connection sends SIGTERM, which closes the connection
  unconditionally and releases all held locks regardless of session state. In a
  multi-level chain, this triggers a cascade: intermediate sessions acquire
  their pending locks and complete, releasing downstream locks in turn.

  Step 4: After your ROOT_CAUSE line, include an explicit RECOMMENDATION section
  that states: (a) cancel_query is ineffective — it does not release the lock
  regardless of whether the root is idle-in-transaction or active; (b)
  terminate_connection is the required action because pg_terminate_backend closes
  the connection unconditionally; (c) in a multi-level chain, only the root
  blocker (blocking_pid = NULL) is the target — terminating an intermediate
  victim frees its downstream sessions temporarily but the root lock persists
  and any replacement immediately requeues.

  Common misdiagnosis: terminating an intermediate victim instead of the root
  blocker. The intermediate will re-queue (or a replacement session will queue)
  immediately. The root blocker is always the sole target.

  Final step: after your ROOT_CAUSE line, output exactly one line in this format
  (no markdown, no extra text on the line):
  FINDINGS: Root blocker PID <pid> (<state>, has_writes=<true|false>); <N>-level chain; terminate_connection required.
escalation:
  - "root blocker has has_writes=true (uncommitted DML) and has been idle > 30 minutes"
  - "lock queue exceeds 20 sessions"
  - "blocking table is a system catalog (pg_class, pg_attribute, etc.)"
target_hints: []

          - "Pending"
          - "PersistentVolumeClaim"
          - "PVC"
          - "StorageClass"
          - "provision"
          - "unbound"
      expected_diagnosis:
        category: "pvc_pending"
    diagnosis_playbook_series_id: pbs_k8s_pvc_triage
    timeout: 60s

  - id: k8s-oomkilled
    name: "OOMKilled"
    category: kubernetes
    severity: critical
    description: >
      The postgres container is killed by the OOM killer because
      its memory limit (10Mi) is too low for PostgreSQL to start.
    inject:
      type: kustomize
      overlay: k8s/overlays/oomkilled
      wait: 30s   # StatefulSet rolling update: old pod terminates, new pod OOMKills at least once
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/oomkilled
      restore: k8s/base
    diagnosis_playbook_series_id: pbs_k8s_pod_crash_triage

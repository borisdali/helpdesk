    timeout: 60s

  - id: k8s-scale-to-zero
    name: "Deployment scaled to zero replicas"
    category: kubernetes
    severity: high
    description: >
      The postgres StatefulSet has been scaled to zero replicas, making the
      database unavailable. This simulates an operator error or a failed
      rollout that left the deployment with no running pods. The agent must

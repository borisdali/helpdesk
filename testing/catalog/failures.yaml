  - id: k8s-pvc-pending
    name: "PVC pending (bad StorageClass)"
    category: kubernetes
    severity: critical
    description: >
      A postgres pod's PVC references a nonexistent StorageClass,
      so the volume cannot be provisioned and the pod stays Pending.
    inject:
      type: kustomize
      overlay: k8s/overlays/pvc-pending
      wait: 45s   # postgres-0 needs the full 30s graceful shutdown period before it is gone; 45s matches k8s-scale-to-zero
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/pvc-pending
      restore: k8s/base
    prompt: >
      The database pod in namespace helpdesk-test is stuck and not

        any_of:
          - "zero replicas"
          - "0 replicas"
          - "no pods"
          - "no running pods"
          - "0 pods"
          - "scaled"
          - "replicas"
          - "unavailable"
          - "0/1"
          - "not available"
      expected_diagnosis:

version: "1"

failures:
  # ── Database failures (13) ─────────────────────────────────────────────

  - id: db-max-connections
    name: "Max connections exhausted"
    category: database
    severity: high
    description: >
      All available PostgreSQL connections are consumed by idle sessions,
      preventing new clients from connecting.
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/inject_max_connections.sh
      detach: true
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/teardown_max_connections.sh
    external_compat: true
    external_inject:
      type: shell_exec
      # Hold idle connections by piping sleep into psql — psql blocks waiting
      # for input, producing state='idle' backends that kill_idle_connections
      # can terminate.  Redirecting the group to /dev/null (} >/dev/null 2>&1 &)
      # prevents FD inheritance: without it, background psql processes hold the
      # parent bash's stdout pipe open and cmd.CombinedOutput() blocks forever.
      # We spawn enough to fill non-superuser slots but leave superuser_reserved
      # connections free so the verify_sql and agent can still connect.
      # $FAULTTEST_CONN is injected by faulttest from the resolved --conn flag.
      script_inline: |
        MAX_CONN=$(psql "$FAULTTEST_CONN" -t -A -c "SHOW max_connections;" 2>/dev/null | tr -d ' \n')
        if ! printf '%s' "$MAX_CONN" | grep -qE '^[0-9]+$'; then
          echo "ERROR: could not read max_connections" >&2; exit 1
        fi
        SU_RESERVED=$(psql "$FAULTTEST_CONN" -t -A -c "SHOW superuser_reserved_connections;" 2>/dev/null | tr -d ' \n')
        SU_RESERVED=${SU_RESERVED:-3}
        # Count existing client backends so we don't over-spawn and block superuser slots.
        EXISTING=$(psql "$FAULTTEST_CONN" -t -A -c \
          "SELECT count(*) FROM pg_stat_activity WHERE backend_type='client backend';" \
          2>/dev/null | tr -d ' \n')
        EXISTING=${EXISTING:-0}
        # Target: fill up to max_connections - superuser_reserved (regular user limit).
        TARGET=$(( MAX_CONN - SU_RESERVED ))
        SLOTS=$(( TARGET - EXISTING ))
        if [ "$SLOTS" -le 0 ]; then
          echo "Slots already at or above target ($EXISTING existing, target $TARGET/$MAX_CONN); skipping"
          exit 0
        fi
        rm -f /tmp/faulttest_maxconn_pids.txt
        for i in $(seq 1 "$SLOTS"); do
          { sleep 600 | psql "$FAULTTEST_CONN" -q; } >/dev/null 2>&1 &
          echo $! >> /tmp/faulttest_maxconn_pids.txt
        done
        sleep 3
        echo "Injected: $SLOTS idle connections ($EXISTING existing → $TARGET/$MAX_CONN)"
    external_teardown:
      type: shell_exec
      script_inline: |
        if [ -f /tmp/faulttest_maxconn_pids.txt ]; then
          # Kill the entire process group (negative PID) so both sleep and psql
          # are terminated; killing only the subshell PID orphans the psql child.
          while read -r pid; do
            kill -- -"$pid" 2>/dev/null || kill "$pid" 2>/dev/null || true
          done < /tmp/faulttest_maxconn_pids.txt
          rm -f /tmp/faulttest_maxconn_pids.txt
          sleep 2
        fi
        # Safety net: terminate any surviving idle backends via postgres.
        psql "$FAULTTEST_CONN" -c "
          SELECT pg_terminate_backend(pid) FROM pg_stat_activity
            WHERE state = 'idle' AND pid <> pg_backend_pid();
        " >/dev/null 2>&1 || true
        echo "Teardown: idle connections terminated"
    prompt: >
      Users are getting "too many clients" errors connecting to the database.
      The connection_string is "{{connection_string}}" — use it verbatim for
      all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
        - get_connection_stats
      expected_keywords:
        any_of:
          - "max_connections"
          - "too many"
          - "connection limit"
          - "connection pool"
          - "exhausted"
      expected_diagnosis:
        category: "connection_exhaustion"
        narrative: "The agent should identify that the PostgreSQL max_connections limit has been reached due to idle or sleeping sessions consuming all available connection slots, and recommend either terminating idle connections or increasing max_connections."
    remediation:
      playbook_id: pbs_connection_triage
      agent_name: database
      agent_prompt: "There are too many idle connections on {{connection_string}}. Please terminate idle connections to free up connection slots."
      verify_sql: "SELECT count(*) < current_setting('max_connections')::int - 5 FROM pg_stat_activity WHERE state = 'idle'"
      verify_timeout: "60s"
    timeout: 60s

  - id: db-long-running-query
    name: "Long-running query blocking"
    category: database
    severity: high
    description: >
      A query holding an ACCESS EXCLUSIVE lock blocks all other access to
      the table, causing application timeouts.
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/inject_long_running_query.sh
      detach: true
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/teardown_long_running_query.sh
    external_compat: true
    external_inject:
      type: shell_exec
      script_inline: |
        psql "$FAULTTEST_CONN" -c "
          CREATE TABLE IF NOT EXISTS _faulttest_longquery (id int PRIMARY KEY);
          INSERT INTO _faulttest_longquery VALUES (1) ON CONFLICT DO NOTHING;
        "
        { printf "BEGIN;\nLOCK TABLE _faulttest_longquery IN ACCESS EXCLUSIVE MODE;\nSELECT pg_sleep(300);\nCOMMIT;\n" \
          | psql "$FAULTTEST_CONN"; } >/dev/null 2>&1 &
        echo $! > /tmp/faulttest_longquery_pid.txt
        sleep 1
        echo "Injected: long-running query holding ACCESS EXCLUSIVE lock on _faulttest_longquery"
    external_teardown:
      type: shell_exec
      script_inline: |
        if [ -f /tmp/faulttest_longquery_pid.txt ]; then
          kill "$(cat /tmp/faulttest_longquery_pid.txt)" 2>/dev/null || true
          rm -f /tmp/faulttest_longquery_pid.txt
        fi
        psql "$FAULTTEST_CONN" -c "
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE query LIKE '%_faulttest_longquery%'
            AND state IN ('active', 'idle in transaction')
            AND pid <> pg_backend_pid();
        "
        psql "$FAULTTEST_CONN" -c "DROP TABLE IF EXISTS _faulttest_longquery;"
    prompt: >
      Queries seem to hang indefinitely and certain tables are inaccessible.
      The connection_string is "{{connection_string}}" — use it verbatim for
      all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - get_active_connections
        - get_lock_info
      expected_keywords:
        any_of:
          - "long-running"
          - "pg_sleep"
          - "ACCESS EXCLUSIVE"
          - "lock"
          - "blocking"
          - "blocked"
      expected_diagnosis:
        category: "lock_blocking"
        narrative: "The agent should identify a long-running query holding an ACCESS EXCLUSIVE lock that is blocking other sessions from accessing the table, and recommend canceling or terminating the blocking query."
    remediation:
      playbook_id: pbs_slow_query_triage
      agent_name: database
      agent_prompt: "A long-running query is holding an ACCESS EXCLUSIVE lock on {{connection_string}}, blocking other sessions. Please identify and cancel or terminate the blocking query."
      verify_sql: "SELECT count(*) = 0 FROM pg_locks WHERE NOT granted"
      verify_timeout: "60s"
    timeout: 90s

  - id: db-lock-contention
    name: "Lock contention / deadlock"
    category: database
    severity: high
    description: >
      Two transactions are each waiting for a lock held by the other,
      causing a deadlock that PostgreSQL detects and resolves by killing
      one session.
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/inject_lock_contention.sh
      detach: true
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/teardown_lock_contention.sh
    external_compat: true
    external_inject:
      type: shell_exec
      # Hold an ACCESS EXCLUSIVE lock in a background psql session.
      # $FAULTTEST_CONN is injected by faulttest from the --conn flag.
      script_inline: |
        psql "$FAULTTEST_CONN" -c "
          CREATE TABLE IF NOT EXISTS _faulttest_lock (id int PRIMARY KEY);
          INSERT INTO _faulttest_lock VALUES (1) ON CONFLICT DO NOTHING;
        "
        { { printf "BEGIN;\nLOCK TABLE _faulttest_lock IN ACCESS EXCLUSIVE MODE;\n"; sleep 600; } \
          | psql "$FAULTTEST_CONN"; } >/dev/null 2>&1 &
        echo $! > /tmp/faulttest_lock_pid.txt
        sleep 1
        echo "Injected: ACCESS EXCLUSIVE lock held by pid=$(cat /tmp/faulttest_lock_pid.txt)"
    external_teardown:
      type: shell_exec
      script_inline: |
        # Kill the local background process (best-effort; psql may outlive the subshell).
        if [ -f /tmp/faulttest_lock_pid.txt ]; then
          kill "$(cat /tmp/faulttest_lock_pid.txt)" 2>/dev/null || true
          rm -f /tmp/faulttest_lock_pid.txt
        fi
        # Terminate the session holding the ACCESS EXCLUSIVE lock on _faulttest_lock
        # so DROP TABLE doesn't block if the local kill didn't propagate to psql.
        # LOCK TABLE doesn't set backend_xid, so we target via pg_locks instead.
        psql "$FAULTTEST_CONN" -c "
          SELECT pg_terminate_backend(l.pid)
          FROM pg_locks l
          JOIN pg_class c ON l.relation = c.oid
          WHERE c.relname = '_faulttest_lock' AND l.granted AND l.pid <> pg_backend_pid();
          DROP TABLE IF EXISTS _faulttest_lock;
        "
    prompt: >
      The database is experiencing intermittent "deadlock detected" errors.
      The connection_string is "{{connection_string}}" — use it verbatim for
      all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - get_lock_info
        - get_active_connections
        - get_wait_events
        - get_blocking_queries
      expected_keywords:
        any_of:
          - "deadlock"
          - "lock contention"
          - "waiting"
          - "blocked"
          - "lock"
      expected_diagnosis:
        category: "deadlock"
        narrative: "The agent should identify lock contention or a deadlock situation where transactions are waiting on locks held by other sessions, and recommend resolving the blocking sessions or reviewing transaction patterns."
    remediation:
      playbook_id: pbs_connection_triage
      agent_name: database
      agent_prompt: "There is lock contention on {{connection_string}}. Please identify and terminate the blocking session to clear the deadlock."
      verify_sql: "SELECT count(*) = 0 FROM pg_locks WHERE NOT granted"
      verify_timeout: "60s"
    timeout: 180s

  - id: db-table-bloat
    name: "Table bloat / dead tuples"
    category: database
    severity: medium
    description: >
      A table has accumulated a large number of dead tuples because
      autovacuum is disabled, wasting disk space and degrading performance.
    external_compat: true
    inject:
      type: sql
      script: sql/inject_table_bloat.sql
    teardown:
      type: sql
      script: sql/teardown_table_bloat.sql
    external_inject:
      type: sql
      script_inline: |
        CREATE TABLE IF NOT EXISTS test_bloat_table (id SERIAL PRIMARY KEY, data TEXT);
        ALTER TABLE test_bloat_table SET (autovacuum_enabled = false);
        INSERT INTO test_bloat_table (data) SELECT repeat('x', 200) FROM generate_series(1, 100000);
        DELETE FROM test_bloat_table WHERE id % 10 != 0;
        CHECKPOINT;
    external_teardown:
      type: sql
      script_inline: "DROP TABLE IF EXISTS test_bloat_table;"
    prompt: >
      The database seems to be using more disk than expected and some queries
      are getting slower. The connection_string is "{{connection_string}}" —
      use it verbatim for all tool calls. Please investigate table health.
    evaluation:
      expected_tools:
        - get_table_stats
      expected_keywords:
        any_of:
          - "dead tuples"
          - "bloat"
          - "autovacuum"
          - "vacuum"
          - "n_dead_tup"
      expected_diagnosis:
        category: "table_bloat"
        narrative: "The agent should identify that a table has accumulated excessive dead tuples because autovacuum is disabled or not keeping up, causing disk bloat and query slowdowns, and recommend running VACUUM or re-enabling autovacuum."
    remediation:
      playbook_id: pbs_vacuum_triage
      agent_name: database
      agent_prompt: "The table test_bloat_table on {{connection_string}} has excessive dead tuples and autovacuum is disabled. Please run VACUUM on it."
      verify_sql: "SELECT COALESCE((SELECT n_dead_tup < 10000 FROM pg_stat_user_tables WHERE relname = 'test_bloat_table'), true)"
      verify_timeout: "120s"
    timeout: 60s

  - id: db-high-cache-miss
    name: "High cache miss ratio"
    category: database
    severity: medium
    description: >
      The database cache hit ratio is low because queries scan tables
      larger than shared_buffers, causing excessive disk I/O.
    external_compat: false  # requires shared_buffers control; one-shot seqscan diluted by agent tool calls
    inject:
      type: sql
      script: sql/inject_high_cache_miss.sql
    teardown:
      type: sql
      script: sql/teardown_high_cache_miss.sql
    external_inject:
      type: sql
      script_inline: |
        CREATE TABLE IF NOT EXISTS test_large_table (id SERIAL PRIMARY KEY, data TEXT);
        INSERT INTO test_large_table (data) SELECT repeat('y', 500) FROM generate_series(1, 100000);
        SELECT pg_stat_reset();
        SELECT count(*) FROM test_large_table WHERE data LIKE '%z%';
    external_teardown:
      type: sql
      script_inline: "DROP TABLE IF EXISTS test_large_table; SELECT pg_stat_reset();"
    prompt: >
      Users report slow query performance. The connection_string is
      "{{connection_string}}" — use it verbatim for all tool calls.
      Please check database health and performance metrics.
    evaluation:
      expected_tools:
        - get_database_stats
        - get_slow_queries
      expected_keywords:
        any_of:
          - "cache hit"
          - "cache miss"
          - "hit ratio"
          - "shared_buffers"
          - "blks_read"
      expected_diagnosis:
        category: "cache_performance"
        narrative: "The agent should identify a low buffer cache hit ratio indicating that queries are reading data from disk rather than shared_buffers, and recommend increasing shared_buffers or optimizing query access patterns."
    timeout: 60s

  - id: db-connection-refused
    name: "Database connection refused"
    category: database
    severity: critical
    description: >
      The PostgreSQL server is stopped and not accepting connections.
    inject:
      type: docker
      action: stop
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    remediation:
      playbook_id: pbs_db_restart_triage
      verify_sql: "SELECT 1"
      verify_timeout: "120s"
    prompt: >
      The database is unreachable and users are getting connection refused
      errors. The connection_string is "{{connection_string}}" — use it
      verbatim for all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "connection refused"
          - "unreachable"
          - "could not connect"
          - "server closed"
          - "not accepting"
      expected_diagnosis:
        category: "connection_refused"
        narrative: "The agent should identify that the PostgreSQL server is not running or not accepting connections, and recommend starting or restarting the database service."
    timeout: 30s

  - id: db-auth-failure
    name: "Authentication failure"
    category: database
    severity: critical
    description: >
      The connection string has incorrect credentials, causing
      authentication failures.
    inject:
      type: config
      override:
        connection_string: "host=localhost port=15432 dbname=testdb user=postgres password=wrongpassword"
    teardown:
      type: config
      restore: true
    prompt: >
      The database is returning authentication errors. The connection_string
      is "{{connection_string}}" — use it verbatim for all tool calls.
      Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "authentication"
          - "password"
          - "auth"
          - "denied"
          - "failed"
      expected_diagnosis:
        category: "authentication_failure"
        narrative: "The agent should identify that the database connection is failing due to incorrect credentials or an authentication error, and recommend verifying the username and password in the connection string."
    timeout: 30s

  - id: db-not-exist
    name: "Database does not exist"
    category: database
    severity: critical
    description: >
      The connection string references a database name that doesn't exist
      on the server.
    inject:
      type: config
      override:
        connection_string: "host=localhost port=15432 dbname=nonexistent_db user=postgres password=testpass"
    teardown:
      type: config
      restore: true
    prompt: >
      Applications are getting errors when connecting to the database.
      The connection_string is "{{connection_string}}" — use it verbatim
      for all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "does not exist"
          - "not found"
          - "no database"
          - "nonexistent"
      expected_diagnosis:
        category: "database_not_found"
        narrative: "The agent should identify that the database name specified in the connection string does not exist on the server, and recommend verifying the database name or creating it."
    timeout: 30s

  - id: db-replication-lag
    name: "Replication lag"
    category: database
    severity: high
    description: >
      The streaming replica has fallen behind the primary due to paused
      WAL replay, causing stale reads.
    external_compat: true
    inject:
      type: sql
      target: replica
      script_inline: "SELECT pg_wal_replay_pause();"
    teardown:
      type: sql
      target: replica
      script_inline: "SELECT pg_wal_replay_resume();"
    prompt: >
      The replica seems to be returning stale data — recent writes on the
      primary are not visible. The primary connection_string is
      "{{connection_string}}" — use it verbatim for all tool calls.
      Please investigate replication status.
    evaluation:
      expected_tools:
        - get_replication_status
      expected_keywords:
        any_of:
          - "replication lag"
          - "replay"
          - "wal"
          - "standby"
          - "behind"
          - "lag"
      expected_diagnosis:
        category: "replication_lag"
        narrative: "The agent should identify that the streaming replica has fallen behind the primary due to paused or stalled WAL replay, and recommend resuming WAL replay or investigating the replica's replication slot."
    remediation:
      playbook_id: pbs_replication_lag
      agent_name: database
      agent_prompt: "The streaming replica on {{connection_string}} has significant replication lag due to paused WAL replay. Please investigate and resume replication."
      verify_sql: "SELECT count(*) = 0 FROM pg_stat_replication WHERE replay_lag > interval '60 seconds'"
      verify_timeout: "120s"
    timeout: 60s

  - id: db-idle-in-transaction
    name: "Session stuck with uncommitted writes"
    category: database
    severity: high
    description: >
      A backend is stuck in a long-running transaction that has performed
      writes (backend_xid IS NOT NULL). Other sessions waiting for locks
      on the affected table are queued. If the stuck session is terminated,
      PostgreSQL must roll back the uncommitted work.
    external_compat: true
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/inject_idle_in_transaction.sh
      detach: true
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/teardown_idle_in_transaction.sh
    external_inject:
      type: shell_exec
      # Create a genuine idle-in-transaction session by piping BEGIN+UPDATE to
      # psql and then holding stdin open with sleep — psql executes the DML and
      # waits for the next command, producing state='idle in transaction'.
      # $FAULTTEST_CONN is injected by faulttest from the --conn flag.
      script_inline: |
        psql "$FAULTTEST_CONN" -c "
          CREATE TABLE IF NOT EXISTS _faulttest_idle (id int PRIMARY KEY, val text);
          INSERT INTO _faulttest_idle VALUES (1, 'held') ON CONFLICT DO NOTHING;
        "
        { { printf "BEGIN;\nUPDATE _faulttest_idle SET val='modified' WHERE id=1;\n"; sleep 600; } \
          | psql "$FAULTTEST_CONN"; } >/dev/null 2>&1 &
        echo $! > /tmp/faulttest_iit_pid.txt
        sleep 1
        echo "Injected: idle-in-transaction session (pid=$(cat /tmp/faulttest_iit_pid.txt))"
    external_teardown:
      type: shell_exec
      script_inline: |
        if [ -f /tmp/faulttest_iit_pid.txt ]; then
          kill "$(cat /tmp/faulttest_iit_pid.txt)" 2>/dev/null || true
          rm -f /tmp/faulttest_iit_pid.txt
          sleep 1
        fi
        psql "$FAULTTEST_CONN" -c "
          SELECT pg_terminate_backend(pid) FROM pg_stat_activity
            WHERE backend_xid IS NOT NULL AND pid <> pg_backend_pid();
          DROP TABLE IF EXISTS _faulttest_idle;
        "
    prompt: >
      A backend session appears to be stuck in a long-running transaction
      and users are experiencing write timeouts on a key table.
      The connection_string is "{{connection_string}}" — use it verbatim
      for all tool calls. Investigate the stuck session, assess how much
      uncommitted work it holds, and determine whether it is safe to
      terminate it.
    evaluation:
      expected_tools:
        - get_active_connections
        - get_session_info
        - terminate_connection
      expected_keywords:
        any_of:
          - "uncommitted"
          - "has writes"
          - "has_writes"
          - "idle in transaction"
          - "rollback"
          - "terminate"
          - "locked"
      expected_diagnosis:
        category: "uncommitted_transaction"
        narrative: "The agent should identify a session stuck in idle-in-transaction state with uncommitted writes (backend_xid set), assess the rollback cost, and recommend terminating it after confirming it is safe to do so."
    remediation:
      playbook_id: pbs_connection_triage
      agent_name: database
      agent_prompt: "There is a session stuck in idle-in-transaction on {{connection_string}} blocking other writes. Please terminate the stuck session to clear the transaction."
      verify_sql: "SELECT count(*) = 0 FROM pg_stat_activity WHERE state = 'idle in transaction'"
      verify_timeout: "60s"
    timeout: 90s

  - id: db-terminate-direct-command
    name: "Direct terminate — inspect-first check"
    category: database
    severity: high
    description: >
      A backend is stuck idle-in-transaction (same injection as
      db-idle-in-transaction). The user gives a direct termination order
      without specifying a PID, forcing the agent to discover the PID via
      get_active_connections, then inspect it via get_session_info, and only
      then call terminate_connection. Verifies the inspect-before-act
      instruction is followed even under an imperative prompt.
    external_compat: true
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/inject_idle_in_transaction.sh
      detach: true
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pgloader
      script: sql/teardown_idle_in_transaction.sh
    external_inject:
      type: shell_exec
      # Same injection as db-idle-in-transaction.
      # $FAULTTEST_CONN is injected by faulttest from the --conn flag.
      script_inline: |
        psql "$FAULTTEST_CONN" -c "
          CREATE TABLE IF NOT EXISTS _faulttest_idle (id int PRIMARY KEY, val text);
          INSERT INTO _faulttest_idle VALUES (1, 'held') ON CONFLICT DO NOTHING;
        "
        { { printf "BEGIN;\nUPDATE _faulttest_idle SET val='modified' WHERE id=1;\n"; sleep 600; } \
          | psql "$FAULTTEST_CONN"; } >/dev/null 2>&1 &
        echo $! > /tmp/faulttest_iit2_pid.txt
        sleep 1
        echo "Injected: idle-in-transaction session (pid=$(cat /tmp/faulttest_iit2_pid.txt))"
    external_teardown:
      type: shell_exec
      script_inline: |
        if [ -f /tmp/faulttest_iit2_pid.txt ]; then
          kill "$(cat /tmp/faulttest_iit2_pid.txt)" 2>/dev/null || true
          rm -f /tmp/faulttest_iit2_pid.txt
          sleep 1
        fi
        psql "$FAULTTEST_CONN" -c "
          SELECT pg_terminate_backend(pid) FROM pg_stat_activity
            WHERE backend_xid IS NOT NULL AND pid <> pg_backend_pid();
          DROP TABLE IF EXISTS _faulttest_idle;
        "
    prompt: >
      A backend session is stuck idle in transaction and is blocking writes
      on a key table. The connection_string is "{{connection_string}}" — use
      it verbatim for all tool calls. Find the blocking session and terminate
      it immediately.
    evaluation:
      expected_tools:
        - get_active_connections
        - get_session_info
        - terminate_connection
      expected_keywords:
        any_of:
          - "idle in transaction"
          - "terminated"
          - "blocking"
          - "session"
          - "pid"
      expected_diagnosis:
        category: "session_termination"
        narrative: "The agent should discover the blocking session PID via get_active_connections, inspect it via get_session_info to assess uncommitted work, and then call terminate_connection — following the inspect-before-act policy."
      expected_tool_order:
        - [get_session_info, terminate_connection]
    timeout: 90s
    # The agent typically terminates without first calling get_session_info
    # when given an imperative "terminate it immediately" prompt.  This is a
    # known behaviour gap, not a test assertion — the suite should still pass.
    governance_gap: true

  # ── Kubernetes failures (7) ────────────────────────────────────────────

  - id: k8s-crashloop
    name: "CrashLoopBackOff"
    category: kubernetes
    severity: critical
    description: >
      The postgres pod is in CrashLoopBackOff because the container
      command exits immediately with an error.
    inject:
      type: kustomize
      overlay: k8s/overlays/crashloop
      wait: 30s   # StatefulSet rolling update: old pod terminates, new pod crashes and enters CrashLoopBackOff
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/crashloop
      restore: k8s/base
    prompt: >
      The database pod in namespace helpdesk-test is not running.
      Users report the database is completely unreachable.
      Please investigate the Kubernetes cluster.
    evaluation:
      expected_tools:
        - get_pods
        - get_events
      expected_keywords:
        any_of:
          - "CrashLoopBackOff"
          - "crash"
          - "BackOff"
          - "restarting"
          - "exit code"
      expected_diagnosis:
        category: "pod_crash_loop"
    timeout: 60s

  - id: k8s-pending
    name: "Pending pod (unschedulable)"
    category: kubernetes
    severity: critical
    description: >
      The postgres pod is stuck in Pending state because it requests
      256Gi of RAM, which no node can satisfy.
    inject:
      type: kustomize
      overlay: k8s/overlays/pending-pod
      wait: 30s   # StatefulSet rolling update: old pod terminates, new pod stays Pending (256Gi request)
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/pending-pod
      restore: k8s/base
    prompt: >
      The database pod in namespace helpdesk-test has been in a non-ready
      state for a while. Please investigate.
    evaluation:
      expected_tools:
        - get_pods
        - get_events
        - get_pod_resources
      expected_keywords:
        any_of:
          - "Pending"
          - "Insufficient"
          - "unschedulable"
          - "node"
          - "memory"
          - "resource"
      expected_diagnosis:
        category: "pod_unschedulable"
    timeout: 60s

  - id: k8s-image-pull
    name: "ImagePullBackOff"
    category: kubernetes
    severity: critical
    description: >
      The postgres pod cannot start because it references a nonexistent
      container image tag.
    inject:
      type: kustomize
      overlay: k8s/overlays/image-pull-backoff
      wait: 30s   # StatefulSet rolling update: old pod terminates, new pod enters ImagePullBackOff
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/image-pull-backoff
      restore: k8s/base
    prompt: >
      The database pod in namespace helpdesk-test is not starting.
      Please check what's happening with the pods.
    evaluation:
      expected_tools:
        - get_pods
        - get_events
      expected_keywords:
        any_of:
          - "ImagePullBackOff"
          - "ErrImagePull"
          - "image"
          - "pull"
          - "not found"
          - "manifest unknown"
      expected_diagnosis:
        category: "image_pull_failure"
    timeout: 60s

  - id: k8s-no-endpoints
    name: "Service with no endpoints"
    category: kubernetes
    severity: high
    description: >
      The postgres service selector doesn't match any pod labels,
      so the service has no backends and connections time out.
    inject:
      type: kustomize
      overlay: k8s/overlays/no-endpoints
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/no-endpoints
      restore: k8s/base
    prompt: >
      Applications in namespace helpdesk-test cannot reach the postgres
      service. Connections to the service IP time out. Please investigate
      the service and its endpoints.
    evaluation:
      expected_tools:
        - get_service
        - get_endpoints
      expected_keywords:
        any_of:
          - "no endpoints"
          - "endpoint"
          - "selector"
          - "mismatch"
          - "no backends"
          - "empty"
      expected_diagnosis:
        category: "no_endpoints"
    timeout: 60s

  - id: k8s-pvc-pending
    name: "PVC pending (bad StorageClass)"
    category: kubernetes
    severity: critical
    description: >
      A postgres pod's PVC references a nonexistent StorageClass,
      so the volume cannot be provisioned and the pod stays Pending.
    inject:
      type: kustomize
      overlay: k8s/overlays/pvc-pending
      wait: 15s   # Scale-to-zero takes ~5-10s; wait lets postgres-0 terminate so only the pending pod remains
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/pvc-pending
      restore: k8s/base
    prompt: >
      The database pod in namespace helpdesk-test is stuck and not
      starting. Please investigate.
    evaluation:
      expected_tools:
        - get_pods
        - get_events
      expected_keywords:
        any_of:
          - "Pending"
          - "PersistentVolumeClaim"
          - "PVC"
          - "StorageClass"
          - "provision"
          - "unbound"
      expected_diagnosis:
        category: "pvc_pending"
    timeout: 60s

  - id: k8s-oomkilled
    name: "OOMKilled"
    category: kubernetes
    severity: critical
    description: >
      The postgres container is killed by the OOM killer because
      its memory limit (10Mi) is too low for PostgreSQL to start.
    inject:
      type: kustomize
      overlay: k8s/overlays/oomkilled
      wait: 30s   # StatefulSet rolling update: old pod terminates, new pod OOMKills at least once
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/oomkilled
      restore: k8s/base
    prompt: >
      The database pod in namespace helpdesk-test keeps restarting.
      Please investigate what's causing the instability.
    evaluation:
      expected_tools:
        - get_pods
        - get_events
        - get_pod_resources
      expected_keywords:
        any_of:
          - "OOMKilled"
          - "out of memory"
          - "memory limit"
          - "killed"
          - "OOM"
      expected_diagnosis:
        category: "oom_killed"
    timeout: 60s

  - id: k8s-scale-to-zero
    name: "Deployment scaled to zero replicas"
    category: kubernetes
    severity: high
    description: >
      The postgres StatefulSet has been scaled to zero replicas, making the
      database unavailable. This simulates an operator error or a failed
      rollout that left the deployment with no running pods. The agent must
      diagnose the zero-replica state and restore service by scaling back up.
    inject:
      type: kustomize
      overlay: k8s/overlays/scale-to-zero
      wait: 45s
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/scale-to-zero
      restore: k8s/base
    prompt: >
      The database in namespace helpdesk-test is not responding and users
      cannot connect. Please investigate the Kubernetes cluster and restore
      database availability.
    evaluation:
      expected_tools:
        - get_pods
        - scale_deployment
      expected_keywords:
        any_of:
          - "zero replicas"
          - "0 replicas"
          - "no pods"
          - "no running pods"
          - "0 pods"
          - "scaled"
          - "replicas"
          - "unavailable"
          - "0/1"
          - "not available"
      expected_diagnosis:
        category: "scaled_down"
    timeout: 90s

  - id: db-vacuum-needed
    name: "Tables needing vacuum (dead tuple bloat)"
    category: database
    severity: medium
    external_compat: true
    description: >
      Several tables have accumulated a large number of dead tuples with
      autovacuum disabled, degrading query performance and wasting disk space.
    inject:
      type: sql
      script_inline: |
        CREATE TABLE IF NOT EXISTS vacuum_bloat (id SERIAL PRIMARY KEY, val TEXT);
        INSERT INTO vacuum_bloat (val) SELECT 'row' || g FROM generate_series(1, 5000) g;
        ALTER TABLE vacuum_bloat SET (autovacuum_enabled = false);
        DELETE FROM vacuum_bloat WHERE id % 2 = 0;
    teardown:
      type: sql
      script_inline: "DROP TABLE IF EXISTS vacuum_bloat;"
    prompt: >
      A DBA reports that queries on several tables are getting slower and
      autovacuum has not run recently. The connection_string is
      "{{connection_string}}" — use it verbatim for all tool calls.
      Check which tables need vacuuming.
    evaluation:
      expected_tools:
        - get_vacuum_status
      expected_keywords:
        any_of:
          - "dead tuples"
          - "dead_ratio"
          - "autovacuum"
          - "vacuum"
          - "bloat"
      expected_diagnosis:
        category: "vacuum_needed"
        narrative: "The agent should identify tables with high dead tuple ratios indicating they need VACUUM, and recommend running VACUUM on the affected tables or re-enabling autovacuum."
    remediation:
      playbook_id: pbs_vacuum_triage
      agent_name: database
      agent_prompt: "Several tables on {{connection_string}} have excessive dead tuples and autovacuum is not keeping up. Please run VACUUM on the affected tables."
      verify_sql: "SELECT COALESCE((SELECT n_dead_tup < 1000 FROM pg_stat_user_tables WHERE relname = 'vacuum_bloat'), true)"
      verify_timeout: "120s"
    timeout: 60s

  - id: db-disk-pressure
    name: "Disk usage — large table growth"
    category: database
    severity: medium
    external_compat: true
    description: >
      A table has grown very large, consuming significant disk space. The
      operator needs to identify which tables and databases are using the most
      storage.
    inject:
      type: sql
      script_inline: |
        CREATE TABLE IF NOT EXISTS disk_pressure_data (id SERIAL PRIMARY KEY, payload TEXT);
        INSERT INTO disk_pressure_data (payload)
          SELECT repeat('x', 2000) FROM generate_series(1, 10000);
    teardown:
      type: sql
      script_inline: "DROP TABLE IF EXISTS disk_pressure_data;"
    prompt: >
      The database server is reporting low disk space alerts. The
      connection_string is "{{connection_string}}" — use it verbatim for all
      tool calls. Identify which databases and tables are consuming the most
      storage.
    evaluation:
      expected_tools:
        - get_disk_usage
      expected_keywords:
        any_of:
          - "disk"
          - "table size"
          - "database size"
          - "storage"
          - "bytes"
          - "MiB"
          - "GiB"
      expected_diagnosis:
        category: "disk_pressure"
        narrative: "The agent should identify which databases or tables are consuming the most disk space and report on the storage situation, recommending cleanup or capacity planning."
    timeout: 60s

  # ── Host failures (1) ──────────────────────────────────────────────────

  - id: host-container-stopped
    name: "Database container stopped"
    category: host
    severity: critical
    description: >
      The PostgreSQL container is stopped on the host. The database is
      unreachable. The sysadmin agent must identify the stopped container
      state and report on the last log output before shutdown.
    inject:
      type: docker
      action: stop
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    prompt: >
      The database server 'faulttest-db' is not responding. Please
      check the host-level status of the server and investigate why
      the database process is not running.
    evaluation:
      expected_tools:
        - check_host
        - get_host_logs
      expected_keywords:
        any_of:
          - "stopped"
          - "exited"
          - "container"
          - "not running"
          - "offline"
          - "shut down"
          - "shutdown"
      expected_diagnosis:
        category: "shutdown"
        narrative: "The agent should identify that the PostgreSQL container or process has been stopped and is not running, and recommend restarting it."
    timeout: 60s

  - id: host-pg-crash
    name: "PostgreSQL process crash inside container"
    category: host
    severity: critical
    description: >
      The postgres container is killed with SIGKILL from the host via
      docker compose kill, simulating an unclean process termination (OOM kill,
      hardware fault, or forced termination). The container exits with code 137
      (128 + SIGKILL=9). The sysadmin agent must distinguish this forced kill
      (exitcode=137) from a clean stop (exitcode=0).
    inject:
      type: docker
      action: kill
      signal: SIGKILL
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    prompt: >
      The database server 'faulttest-db' is not responding. Please
      check the host-level status of the server and investigate why
      the database process is not running.
    evaluation:
      expected_tools:
        - check_host
        - get_host_logs
      expected_keywords:
        any_of:
          - "crashed"
          - "crash"
          - "signal"
          - "aborted"
          - "exit code"
          - "exitcode"
          - "killed"
          - "abnormal"
      expected_diagnosis:
        category: "container_killed"
        narrative: "The agent should identify that the PostgreSQL process was forcibly killed (SIGKILL / exit code 137) rather than cleanly stopped, distinguishing it from a normal shutdown, and recommend restarting the database."
    timeout: 60s
    # GOVERNANCE GAP: the sysadmin agent cannot distinguish a SIGKILL (exit 137)
    # from a clean stop (exit 0) — both appear as "container stopped" in tool output.
    # The agent diagnoses both as "clean shutdown / administrator command" when it
    # should detect the abnormal exit code. Fix requires the check_host tool to
    # expose the container exit code and the agent to reason about it.
    governance_gap: true

  # ── SSH-injectable host failures (3) ───────────────────────────────────
  # These faults require OS-level access via SSH. Use --external=false (default)
  # and supply --ssh-host / --ssh-key when targeting real VMs.

  - id: db-pg-hba-corrupt
    name: "pg_hba.conf corrupted — all connections rejected"
    category: database
    severity: critical
    description: >
      The pg_hba.conf file is replaced with a version that rejects all
      non-local connections. All application connections fail with
      "pg_hba.conf rejects connection".
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pg
      user: postgres
      script_inline: |
        #!/bin/bash
        set -e
        # Wait for postgres to be ready (previous test may have restarted it).
        for i in $(seq 1 20); do
          psql -t -c "SELECT 1" >/dev/null 2>&1 && break
          sleep 1
        done
        PG_HBA=$(psql -t -c "SHOW hba_file;" | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "$PG_HBA" "${PG_HBA}.faulttest.bak"
        printf 'local all all trust\nhost all all 0.0.0.0/0 reject\nhost all all ::/0 reject\n' > "$PG_HBA"
        kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pg
      user: postgres
      script_inline: |
        #!/bin/bash
        set -e
        PG_HBA=$(psql -t -c "SHOW hba_file;" | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${PG_HBA}.faulttest.bak" "$PG_HBA"
        rm -f "${PG_HBA}.faulttest.bak"
        kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    external_inject:
      type: ssh_exec
      exec_via: ""  # filled by --ssh-host at runtime
      script_inline: |
        #!/bin/bash
        set -e
        PG_HBA=$(psql -t -c "SHOW hba_file;" 2>/dev/null | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "$PG_HBA" "${PG_HBA}.faulttest.bak"
        printf 'local all all trust\nhost all all 0.0.0.0/0 reject\nhost all all ::/0 reject\n' > "$PG_HBA"
        pg_ctl reload -D "$DATA_DIR" 2>/dev/null || kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    external_teardown:
      type: ssh_exec
      exec_via: ""
      script_inline: |
        #!/bin/bash
        set -e
        PG_HBA=$(psql -t -c "SHOW hba_file;" 2>/dev/null | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${PG_HBA}.faulttest.bak" "$PG_HBA"
        rm -f "${PG_HBA}.faulttest.bak"
        pg_ctl reload -D "$DATA_DIR" 2>/dev/null || kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    remediation:
      playbook_id: pbs_db_config_recovery
      verify_sql: "SELECT 1"
      verify_timeout: "120s"
    prompt: >
      All application connections to the database are failing with "pg_hba.conf
      rejects connection". The connection_string is "{{connection_string}}" —
      use it verbatim for all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "pg_hba"
          - "hba"
          - "rejects"
          - "authentication"
          - "rejected"
      expected_diagnosis:
        category: "hba_rejection"
        narrative: "The agent should identify that pg_hba.conf is rejecting connections from the client address, and recommend reviewing and correcting the pg_hba.conf rules to allow the appropriate connections."
    timeout: 60s

  - id: db-process-kill
    name: "PostgreSQL postmaster killed (SIGKILL)"
    category: database
    severity: critical
    description: >
      The PostgreSQL postmaster is killed with SIGKILL, simulating an OS-level
      crash or forced termination. The database is completely unreachable until
      restarted.
    inject:
      type: docker
      action: kill
      signal: SIGKILL
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    external_inject:
      type: ssh_exec
      exec_via: ""  # filled by --ssh-host at runtime
      script_inline: |
        #!/bin/bash
        set -e
        POSTMASTER=$(cat "$(psql -t -c "SHOW data_directory;" | tr -d ' ')"/postmaster.pid 2>/dev/null | head -1) || true
        if [ -n "$POSTMASTER" ]; then
          kill -9 "$POSTMASTER" 2>/dev/null || true
        fi
    external_teardown:
      type: ssh_exec
      exec_via: ""
      script_inline: |
        #!/bin/bash
        pg_ctl start -D "$(psql -t -c "SHOW data_directory;" 2>/dev/null | tr -d ' ')" -l /tmp/pg.log 2>/dev/null || \
          systemctl start postgresql 2>/dev/null || \
          service postgresql start 2>/dev/null || true
        sleep 3
    remediation:
      playbook_id: pbs_db_restart_triage
      verify_sql: "SELECT 1"
      verify_timeout: "120s"
    prompt: >
      The database server is completely unreachable — processes appear to have
      crashed. The connection_string is "{{connection_string}}" — use it
      verbatim for all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "connection refused"
          - "unreachable"
          - "crashed"
          - "killed"
          - "not running"
      expected_diagnosis:
        category: "process_crash"
        narrative: "The agent should identify that the PostgreSQL postmaster process has crashed or been killed and is not accepting connections, and recommend restarting the PostgreSQL service."
    timeout: 60s

  - id: db-config-bad-param
    name: "postgresql.conf invalid parameter"
    category: database
    severity: high
    description: >
      A nonsensical value is injected into postgresql.conf (shared_buffers=999GB).
      PostgreSQL refuses to start after a reload / restart.
    inject:
      type: shell_exec
      script_inline: |
        #!/bin/bash
        set -e
        # Wait for postgres to be ready (up to 60s) — previous test may have restarted the container.
        for i in $(seq 1 60); do
          docker exec helpdesk-test-pg pg_isready -U postgres 2>/dev/null && break
          sleep 1
        done
        # Add the invalid parameter while postgres is running, then stop the container.
        # The container's data volume retains the bad config, so postgres will fail to
        # start when the container is restarted (simulating a bad-config startup failure).
        docker exec -u postgres helpdesk-test-pg bash -c '
          set -e
          DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d " ")
          cp "${DATA_DIR}/postgresql.conf" "${DATA_DIR}/postgresql.conf.faulttest.bak"
          echo "shared_buffers = 999GB  # faulttest" >> "${DATA_DIR}/postgresql.conf"
        '
        docker stop helpdesk-test-pg
    teardown:
      type: shell_exec
      script_inline: |
        #!/bin/bash
        set -e
        # Restore the clean config from the backup we left on the data volume.
        # docker cp works on stopped containers.
        docker cp helpdesk-test-pg:/var/lib/postgresql/data/postgresql.conf.faulttest.bak \
          /tmp/pg_conf_faulttest.bak
        docker cp /tmp/pg_conf_faulttest.bak \
          helpdesk-test-pg:/var/lib/postgresql/data/postgresql.conf
        rm -f /tmp/pg_conf_faulttest.bak
        docker start helpdesk-test-pg
        # Wait for postgres to be ready (up to 30s).
        for i in $(seq 1 30); do
          docker exec helpdesk-test-pg pg_isready -U postgres 2>/dev/null && exit 0
          sleep 1
        done
        echo "WARNING: postgres not ready after 30s" >&2
    external_inject:
      type: ssh_exec
      exec_via: ""  # filled by --ssh-host at runtime
      script_inline: |
        #!/bin/bash
        set -e
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${DATA_DIR}/postgresql.conf" "${DATA_DIR}/postgresql.conf.faulttest.bak"
        echo "shared_buffers = 999GB  # faulttest" >> "${DATA_DIR}/postgresql.conf"
    external_teardown:
      type: ssh_exec
      exec_via: ""
      script_inline: |
        #!/bin/bash
        set -e
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${DATA_DIR}/postgresql.conf.faulttest.bak" "${DATA_DIR}/postgresql.conf"
        rm -f "${DATA_DIR}/postgresql.conf.faulttest.bak"
    prompt: >
      After a recent configuration change the database is failing to start.
      The connection_string is "{{connection_string}}" — use it verbatim for
      all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "postgresql.conf"
          - "configuration"
          - "invalid"
          - "parameter"
          - "shared_buffers"
      expected_diagnosis:
        category: "config_error"
        narrative: "The agent should identify that PostgreSQL cannot start due to an invalid configuration parameter in postgresql.conf (such as an out-of-range shared_buffers value), and recommend correcting or reverting the configuration file."
    timeout: 60s

  # ── Compound failures (2) ──────────────────────────────────────────────

  - id: compound-db-pod-crash
    name: "DB unreachable + pod crashing"
    category: compound
    severity: critical
    governance_gap: true
    description: >
      The database is unreachable because the pod is in CrashLoopBackOff.
      Requires both the DB agent (to report connection failure) and the
      K8s agent (to diagnose the pod crash).
      GOVERNANCE GAP: In the local test setup the DB agent connects to
      localhost:15432 (docker compose postgres) which remains reachable
      regardless of the k8s pod state. Without an orchestrator routing
      through k8s, the agent correctly reports the DB as healthy and
      stops without investigating k8s. This test documents the limitation
      rather than asserting correct behaviour.
    inject:
      type: kustomize
      overlay: k8s/overlays/crashloop
      wait: 30s   # Same as k8s-crashloop: wait for rolling update + CrashLoopBackOff before prompting
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/crashloop
      restore: k8s/base
    prompt: >
      The database is completely unreachable. It's running in Kubernetes
      namespace helpdesk-test. The connection_string is
      "{{connection_string}}" — use it verbatim for all tool calls.
      Please investigate both the database connectivity and the
      Kubernetes infrastructure.
    evaluation:
      expected_tools:
        - check_connection
        - get_pods
        - get_events
      expected_keywords:
        any_of:
          - "CrashLoopBackOff"
          - "crash"
          - "connection refused"
          - "unreachable"
      expected_diagnosis:
        category: "compound_crash"
    timeout: 90s

  - id: compound-db-no-endpoints
    name: "DB timeout + no endpoints"
    category: compound
    severity: critical
    description: >
      The database connection times out because the Kubernetes service
      has no endpoints due to a selector mismatch.
    inject:
      type: kustomize
      overlay: k8s/overlays/no-endpoints
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/no-endpoints
      restore: k8s/base
    prompt: >
      The database is timing out. It's running in Kubernetes namespace
      helpdesk-test. The connection_string is "{{connection_string}}" —
      use it verbatim for all tool calls. Please investigate both the
      database connectivity and the Kubernetes service configuration.
    evaluation:
      expected_tools:
        - check_connection
        - get_service
        - get_endpoints
      expected_keywords:
        any_of:
          - "no endpoints"
          - "timeout"
          - "selector"
          - "mismatch"
      expected_diagnosis:
        category: "compound_no_endpoints"
    timeout: 90s

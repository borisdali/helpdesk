    diagnosis_playbook_series_id: pbs_k8s_scale_to_zero_triage
    remediation:
      playbook_id: pbs_k8s_scale_to_zero_remediate
      verify_sql: "SELECT 1"
      verify_timeout: "120s"
    timeout: 90s

  - id: db-vacuum-needed
    name: "Tables needing vacuum (dead tuple bloat)"
    category: database
    severity: medium
    external_compat: true
    description: >
      Several tables have accumulated a large number of dead tuples with
      autovacuum disabled, degrading query performance and wasting disk space.
    inject:
      type: sql
      script_inline: |
        CREATE TABLE IF NOT EXISTS vacuum_bloat (id SERIAL PRIMARY KEY, val TEXT);
        INSERT INTO vacuum_bloat (val) SELECT 'row' || g FROM generate_series(1, 5000) g;
        ALTER TABLE vacuum_bloat SET (autovacuum_enabled = false);
        DELETE FROM vacuum_bloat WHERE id % 2 = 0;
    teardown:
      type: sql
      script_inline: "DROP TABLE IF EXISTS vacuum_bloat;"
    diagnosis_playbook_series_id: pbs_vacuum_triage
    prompt: >
      A DBA reports that queries on several tables are getting slower and
      autovacuum has not run recently. The connection_string is
      "{{connection_string}}" — use it verbatim for all tool calls.
      Check which tables need vacuuming.
    evaluation:
      expected_tools:
        - get_vacuum_status
      expected_keywords:
        any_of:
          - "dead tuples"
          - "dead_ratio"
          - "autovacuum"
          - "vacuum"
          - "bloat"
      expected_diagnosis:
        category: "vacuum_needed"
        narrative: "The agent should identify tables with high dead tuple ratios indicating they need VACUUM, and recommend running VACUUM on the affected tables or re-enabling autovacuum."
    remediation:
      playbook_id: pbs_vacuum_remediate
      verify_sql: "SELECT COALESCE((SELECT n_dead_tup < 1000 FROM pg_stat_user_tables WHERE relname = 'vacuum_bloat'), true)"
      verify_timeout: "120s"
    timeout: 60s

  - id: db-disk-pressure
    name: "Disk usage — large table growth"
    category: database
    severity: medium
    external_compat: true
    description: >
      A table has grown very large, consuming significant disk space. The
      operator needs to identify which tables and databases are using the most
      storage.
    inject:
      type: sql
      script_inline: |
        CREATE TABLE IF NOT EXISTS disk_pressure_data (id SERIAL PRIMARY KEY, payload TEXT);
        INSERT INTO disk_pressure_data (payload)
          SELECT repeat('x', 2000) FROM generate_series(1, 10000);
    teardown:
      type: sql
      script_inline: "DROP TABLE IF EXISTS disk_pressure_data;"
    prompt: >
      The database server is reporting low disk space alerts. The
      connection_string is "{{connection_string}}" — use it verbatim for all
      tool calls. Identify which databases and tables are consuming the most
      storage.
    evaluation:
      expected_tools:
        - get_disk_usage
      expected_keywords:
        any_of:
          - "disk"
          - "table size"
          - "database size"
          - "storage"
          - "bytes"
          - "MiB"
          - "GiB"
      expected_diagnosis:
        category: "disk_pressure"
        narrative: "The agent should identify which databases or tables are consuming the most disk space and report on the storage situation, recommending cleanup or capacity planning."
    diagnosis_playbook_series_id: pbs_disk_pressure_triage
    timeout: 60s

  # ── Host failures (1) ──────────────────────────────────────────────────

  - id: host-container-stopped
    name: "Database container stopped"
    category: host
    severity: critical
    description: >
      The PostgreSQL container is stopped on the host. The database is
      unreachable. The sysadmin agent must identify the stopped container
      state and report on the last log output before shutdown.
    inject:
      type: docker
      action: stop
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    diagnosis_playbook_series_id: pbs_db_restart_triage
    prompt: >
      The database server '{{server_id}}' is not responding. Please
      check the host-level status of the server and investigate why
      the database process is not running.
    evaluation:
      expected_tools:
        - check_host
        - get_host_logs
      expected_keywords:
        any_of:
          - "stopped"
          - "exited"
          - "container"
          - "not running"
          - "offline"
          - "shut down"
          - "shutdown"
      expected_diagnosis:
        category: "shutdown"
        narrative: "The agent should identify that the PostgreSQL container or process has been stopped and is not running, and recommend restarting it."
    timeout: 60s

  - id: host-pg-crash
    name: "PostgreSQL process crash inside container"
    category: host
    severity: critical
    description: >
      The postgres container is killed with SIGKILL from the host via
      docker compose kill, simulating an unclean process termination (OOM kill,
      hardware fault, or forced termination). The container exits with code 137
      (128 + SIGKILL=9). The sysadmin agent must distinguish this forced kill
      (exitcode=137) from a clean stop (exitcode=0).
    inject:
      type: docker
      action: kill
      signal: SIGKILL
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    diagnosis_playbook_series_id: pbs_db_restart_triage
    prompt: >
      The database server '{{server_id}}' is not responding. Please
      check the host-level status of the server and investigate why
      the database process is not running.
    evaluation:
      expected_tools:
        - check_host
        - get_host_logs
      expected_keywords:
        any_of:
          - "crashed"
          - "crash"
          - "signal"
          - "aborted"
          - "exit code"
          - "exitcode"
          - "killed"
          - "abnormal"
      expected_diagnosis:
        category: "container_killed"
        narrative: "The agent should identify that the PostgreSQL process was forcibly killed (SIGKILL / exit code 137) rather than cleanly stopped, distinguishing it from a normal shutdown, and recommend restarting the database."
    timeout: 60s
    # GOVERNANCE GAP: the sysadmin agent cannot distinguish a SIGKILL (exit 137)
    # from a clean stop (exit 0) — both appear as "container stopped" in tool output.
    # The agent diagnoses both as "clean shutdown / administrator command" when it
    # should detect the abnormal exit code. Fix requires the check_host tool to
    # expose the container exit code and the agent to reason about it.
    governance_gap: true

  # ── SSH-injectable host failures (3) ───────────────────────────────────
  # These faults require OS-level access via SSH. Use --external=false (default)
  # and supply --ssh-host / --ssh-key when targeting real VMs.

  - id: db-pg-hba-corrupt
    name: "pg_hba.conf corrupted — all connections rejected"
    category: database
    severity: critical
    description: >
      The pg_hba.conf file is replaced with a version that rejects all
      non-local connections. All application connections fail with
      "pg_hba.conf rejects connection".
    external_compat: true  # SSH: edit pg_hba.conf + reload
    inject:
      type: docker_exec
      exec_via: helpdesk-test-pg
      user: postgres
      script_inline: |
        #!/bin/bash
        set -e
        # Wait for postgres to be ready (previous test may have restarted it).
        for i in $(seq 1 20); do
          psql -t -c "SELECT 1" >/dev/null 2>&1 && break
          sleep 1
        done
        PG_HBA=$(psql -t -c "SHOW hba_file;" | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "$PG_HBA" "${PG_HBA}.faulttest.bak"
        printf 'local all all trust\nhost all all 0.0.0.0/0 reject\nhost all all ::/0 reject\n' > "$PG_HBA"
        kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    teardown:
      type: docker_exec
      exec_via: helpdesk-test-pg
      user: postgres
      script_inline: |
        #!/bin/bash
        set -e
        PG_HBA=$(psql -t -c "SHOW hba_file;" | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${PG_HBA}.faulttest.bak" "$PG_HBA"
        rm -f "${PG_HBA}.faulttest.bak"
        kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    external_inject:
      type: ssh_exec
      exec_via: ""  # filled by --ssh-host at runtime
      script_inline: |
        #!/bin/bash
        set -e
        PG_HBA=$(psql -t -c "SHOW hba_file;" 2>/dev/null | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "$PG_HBA" "${PG_HBA}.faulttest.bak"
        printf 'local all all trust\nhost all all 0.0.0.0/0 reject\nhost all all ::/0 reject\n' > "$PG_HBA"
        pg_ctl reload -D "$DATA_DIR" 2>/dev/null || kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    external_teardown:
      type: ssh_exec
      exec_via: ""
      script_inline: |
        #!/bin/bash
        set -e
        PG_HBA=$(psql -t -c "SHOW hba_file;" 2>/dev/null | tr -d ' ')
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${PG_HBA}.faulttest.bak" "$PG_HBA"
        rm -f "${PG_HBA}.faulttest.bak"
        pg_ctl reload -D "$DATA_DIR" 2>/dev/null || kill -HUP "$(head -1 ${DATA_DIR}/postmaster.pid)"
    diagnosis_playbook_series_id: pbs_pg_hba_triage
    remediation:
      playbook_id: pbs_db_config_recovery
      verify_sql: "SELECT 1"
      verify_timeout: "120s"
    prompt: >
      All application connections to the database are failing with "pg_hba.conf
      rejects connection". The connection_string is "{{connection_string}}" —
      use it verbatim for all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "pg_hba"
          - "hba"
          - "rejects"
          - "authentication"
          - "rejected"
      expected_diagnosis:
        category: "hba_rejection"
        narrative: "The agent should identify that pg_hba.conf is rejecting connections from the client address, and recommend reviewing and correcting the pg_hba.conf rules to allow the appropriate connections."
    timeout: 60s

  - id: db-process-kill
    name: "PostgreSQL postmaster killed (SIGKILL)"
    category: database
    severity: critical
    description: >
      The PostgreSQL postmaster is killed with SIGKILL, simulating an OS-level
      crash or forced termination. The database is completely unreachable until
      restarted.
    external_compat: true  # SSH: kill -9 postmaster PID; teardown: restart service
    inject:
      type: docker
      action: kill
      signal: SIGKILL
      service: postgres
    teardown:
      type: docker
      action: start
      service: postgres
    external_inject:
      type: ssh_exec
      exec_via: ""  # filled by --ssh-host at runtime
      script_inline: |
        #!/bin/bash
        set -e
        POSTMASTER=$(cat "$(psql -t -c "SHOW data_directory;" | tr -d ' ')"/postmaster.pid 2>/dev/null | head -1) || true
        if [ -n "$POSTMASTER" ]; then
          kill -9 "$POSTMASTER" 2>/dev/null || true
        fi
    external_teardown:
      type: ssh_exec
      exec_via: ""
      script_inline: |
        #!/bin/bash
        pg_ctl start -D "$(psql -t -c "SHOW data_directory;" 2>/dev/null | tr -d ' ')" -l /tmp/pg.log 2>/dev/null || \
          systemctl start postgresql 2>/dev/null || \
          service postgresql start 2>/dev/null || true
        sleep 3
    remediation:
      playbook_id: pbs_db_restart_triage
      verify_sql: "SELECT 1"
      verify_timeout: "120s"
    diagnosis_playbook_series_id: pbs_db_restart_triage
    prompt: >
      The database server is completely unreachable — processes appear to have
      crashed. The connection_string is "{{connection_string}}" — use it
      verbatim for all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "connection refused"
          - "unreachable"
          - "crashed"
          - "killed"
          - "not running"
      expected_diagnosis:
        category: "process_crash"
        narrative: "The agent should identify that the PostgreSQL postmaster process has crashed or been killed and is not accepting connections, and recommend restarting the PostgreSQL service."
    timeout: 60s

  - id: db-config-bad-param
    name: "postgresql.conf invalid parameter"
    category: database
    severity: high
    description: >
      A nonsensical value is injected into postgresql.conf (shared_buffers=999GB).
      PostgreSQL refuses to start after a reload / restart.
    external_compat: true  # SSH: edit postgresql.conf; teardown: restore + restart
    inject:
      type: shell_exec
      script_inline: |
        #!/bin/bash
        set -e
        # Wait for postgres to be ready (up to 60s) — previous test may have restarted the container.
        for i in $(seq 1 60); do
          docker exec helpdesk-test-pg pg_isready -U postgres 2>/dev/null && break
          sleep 1
        done
        # Add the invalid parameter while postgres is running, then stop the container.
        # The container's data volume retains the bad config, so postgres will fail to
        # start when the container is restarted (simulating a bad-config startup failure).
        docker exec -u postgres helpdesk-test-pg bash -c '
          set -e
          DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d " ")
          cp "${DATA_DIR}/postgresql.conf" "${DATA_DIR}/postgresql.conf.faulttest.bak"
          echo "shared_buffers = 999GB  # faulttest" >> "${DATA_DIR}/postgresql.conf"
        '
        docker stop helpdesk-test-pg
    teardown:
      type: shell_exec
      script_inline: |
        #!/bin/bash
        set -e
        # Restore the clean config from the backup we left on the data volume.
        # docker cp works on stopped containers.
        docker cp helpdesk-test-pg:/var/lib/postgresql/data/postgresql.conf.faulttest.bak \
          /tmp/pg_conf_faulttest.bak
        docker cp /tmp/pg_conf_faulttest.bak \
          helpdesk-test-pg:/var/lib/postgresql/data/postgresql.conf
        rm -f /tmp/pg_conf_faulttest.bak
        docker start helpdesk-test-pg
        # Wait for postgres to be ready (up to 30s).
        for i in $(seq 1 30); do
          docker exec helpdesk-test-pg pg_isready -U postgres 2>/dev/null && exit 0
          sleep 1
        done
        echo "WARNING: postgres not ready after 30s" >&2
    external_inject:
      type: ssh_exec
      exec_via: ""  # filled by --ssh-host at runtime
      script_inline: |
        #!/bin/bash
        set -e
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${DATA_DIR}/postgresql.conf" "${DATA_DIR}/postgresql.conf.faulttest.bak"
        echo "shared_buffers = 999GB  # faulttest" >> "${DATA_DIR}/postgresql.conf"
    external_teardown:
      type: ssh_exec
      exec_via: ""
      script_inline: |
        #!/bin/bash
        set -e
        DATA_DIR=$(psql -t -c "SHOW data_directory;" | tr -d ' ')
        cp "${DATA_DIR}/postgresql.conf.faulttest.bak" "${DATA_DIR}/postgresql.conf"
        rm -f "${DATA_DIR}/postgresql.conf.faulttest.bak"
    prompt: >
      After a recent configuration change the database is failing to start.
      The connection_string is "{{connection_string}}" — use it verbatim for
      all tool calls. Please investigate.
    evaluation:
      expected_tools:
        - check_connection
      expected_keywords:
        any_of:
          - "postgresql.conf"
          - "configuration"
          - "invalid"
          - "parameter"
          - "shared_buffers"
      expected_diagnosis:
        category: "config_error"
        narrative: "The agent should identify that PostgreSQL cannot start due to an invalid configuration parameter in postgresql.conf (such as an out-of-range shared_buffers value), and recommend correcting or reverting the configuration file."
    timeout: 60s

  # ── Compound failures (2) ──────────────────────────────────────────────

  - id: compound-db-pod-crash
    name: "DB unreachable + pod crashing"
    category: compound
    severity: critical
    governance_gap: true
    description: >
      The database is unreachable because the pod is in CrashLoopBackOff.
      Requires both the DB agent (to report connection failure) and the
      K8s agent (to diagnose the pod crash).
      GOVERNANCE GAP: In the local test setup the DB agent connects to
      localhost:15432 (docker compose postgres) which remains reachable
      regardless of the k8s pod state. Without an orchestrator routing
      through k8s, the agent correctly reports the DB as healthy and
      stops without investigating k8s. This test documents the limitation
      rather than asserting correct behaviour.
    inject:
      type: kustomize
      overlay: k8s/overlays/crashloop
      wait: 30s   # Same as k8s-crashloop: wait for rolling update + CrashLoopBackOff before prompting
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/crashloop
      restore: k8s/base
    prompt: >
      The database is completely unreachable. It's running in Kubernetes
      namespace helpdesk-test. The connection_string is
      "{{connection_string}}" — use it verbatim for all tool calls.
      Please investigate both the database connectivity and the
      Kubernetes infrastructure.
    evaluation:
      expected_tools:
        - check_connection
        - get_pods
        - get_events
      expected_keywords:
        any_of:
          - "CrashLoopBackOff"
          - "crash"
          - "connection refused"
          - "unreachable"
      expected_diagnosis:
        category: "compound_crash"
    timeout: 90s

  - id: compound-db-no-endpoints
    name: "DB timeout + no endpoints"
    category: compound
    severity: critical
    description: >
      The database connection times out because the Kubernetes service
      has no endpoints due to a selector mismatch.
    inject:
      type: kustomize
      overlay: k8s/overlays/no-endpoints
    teardown:
      type: kustomize_delete
      overlay: k8s/overlays/no-endpoints
      restore: k8s/base
    prompt: >
      The database is timing out. It's running in Kubernetes namespace
      helpdesk-test. The connection_string is "{{connection_string}}" —
      use it verbatim for all tool calls. Please investigate both the
      database connectivity and the Kubernetes service configuration.
    evaluation:
      expected_tools:
        - check_connection
        - get_service
        - get_endpoints
      expected_keywords:
        any_of:
          - "no endpoints"
          - "timeout"
          - "selector"
          - "mismatch"
      expected_diagnosis:
        category: "compound_no_endpoints"
    timeout: 90s

  - id: db-wal-disk-full
    name: "WAL disk full — writes failing"
    category: host
    severity: critical
    description: >
      The pg_wal directory fills to capacity, leaving no room for new WAL
      segments. PostgreSQL emits PANIC ("could not write to file pg_wal/...:
      No space left on device") and stops. The database is unreachable.
      The sysadmin agent must read container logs to distinguish disk-full
      from a process crash or clean shutdown, then guide safe WAL cleanup
      before restart.
    inject:
      type: shell_exec
      script: sql/inject_wal_disk_full.sh
    teardown:
      type: shell_exec
      script: sql/teardown_wal_disk_full.sh
    external_compat: true
    external_inject:
      type: ssh_exec
      # $FAULTTEST_CONTAINER is injected by faulttest from the infra config's
      # container_name field.  Falls back to "postgres" as a common default.
      # The script writes fake WAL PANIC/FATAL lines to the PostgreSQL log file
      # and SIGKILLs the container — no disk space is consumed.
      script_inline: |
        set -e
        CONTAINER="${FAULTTEST_CONTAINER:-postgres}"
        if ! docker inspect --format "{{.State.Running}}" "$CONTAINER" 2>/dev/null | grep -q true; then
          echo "ERROR: $CONTAINER is not running" >&2
          exit 1
        fi
        TS=$(docker exec "$CONTAINER" date -u '+%Y-%m-%d %H:%M:%S.000 UTC')
        docker exec "$CONTAINER" bash -c "
          mkdir -p /var/lib/postgresql/data/log
          echo '${TS} [1] FATAL:  could not write to file \"pg_wal/000000010000000000000001\": No space left on device' \
            >> /var/lib/postgresql/data/log/postgresql.log
          echo '${TS} [1] PANIC:  could not write to file \"pg_wal/000000010000000000000001\": No space left on device' \
            >> /var/lib/postgresql/data/log/postgresql.log
          echo '${TS} [1] LOG:  startup process (PID 1) was terminated by signal 6: Aborted' \
            >> /var/lib/postgresql/data/log/postgresql.log
        "
        docker kill "$CONTAINER" > /dev/null
        for i in $(seq 1 10); do
          STATUS=$(docker inspect --format "{{.State.Running}}" "$CONTAINER" 2>/dev/null || echo "false")
          if [ "$STATUS" != "true" ]; then
            EXIT_CODE=$(docker inspect --format "{{.State.ExitCode}}" "$CONTAINER" 2>/dev/null || echo "?")
            echo "Container stopped (ExitCode=${EXIT_CODE})"
            exit 0
          fi
          sleep 1
        done
        echo "Warning: container still running after 10 s"
    external_teardown:
      type: ssh_exec
      script_inline: |
        CONTAINER="${FAULTTEST_CONTAINER:-postgres}"
        docker start "$CONTAINER"
        echo "Started $CONTAINER"
        for i in $(seq 1 20); do
          if docker exec "$CONTAINER" pg_isready -U postgres -q 2>/dev/null; then
            echo "PostgreSQL ready after $((i * 3)) s"
            exit 0
          fi
          sleep 3
        done
        echo "WARNING: PostgreSQL not healthy after 60 s" >&2
        exit 1
    prompt: >
      The database server '{{server_id}}' is unreachable — connection refused.
      Please check the host-level status of the server and investigate why
      the database process has stopped.
    evaluation:
      expected_tools:
        - check_host
        - get_host_logs
        - read_pg_log_file
      expected_keywords:
        any_of:
          - "pg_wal"
          - "WAL"
          - "disk"
          - "space"
          - "No space left"
          - "PANIC"
      expected_diagnosis:
        category: "wal_disk_full"
        narrative: >
          The agent should identify that PostgreSQL stopped due to a full WAL
          disk (PANIC in the pg log file). With logging_collector=on, the PANIC
          is not visible in docker container logs — the agent must call
          read_pg_log_file after finding docker logs uninformative. The agent
          should recommend freeing disk space in pg_wal before restarting.
    timeout: 90s
    remediation:
      agent_name: sysadmin
      agent_prompt: "The PostgreSQL server '{{server_id}}' was stopped due to WAL disk exhaustion (PANIC in pg_wal). The WAL space issue has been resolved. Please restart the database container so the server becomes reachable again."
      verify_sql: "SELECT 1"
      verify_timeout: "120s"

  - id: db-wal-disk-full-k8s
    name: "WAL disk full — writes failing (Kubernetes)"
    category: kubernetes
    severity: critical
    external_compat: true  # injects via kubectl exec — no Docker required
    diagnosis_playbook_series_id: pbs_k8s_pod_crash_triage  # used with --via-gateway for A/B comparison
    description: >
      The PostgreSQL pod emits PANIC ("could not write to file pg_wal/...:
      No space left on device") and shuts down (exit code 0, reason=Completed —
      postgres performs an emergency shutdown after a PANIC). Simulated by
      writing fake PANIC lines to the on-disk postgres log file then sending
      SIGQUIT to the postmaster — no disk space is consumed. The K8s agent
      must notice get_pod_logs returns empty (logging_collector=on), call
      read_pod_file on the on-disk log, and identify the WAL disk full root cause.
    inject:
      type: shell_exec
      script_inline: |
        set -e
        CTX_ARG=""
        [ -n "$FAULTTEST_K8S_CONTEXT" ] && CTX_ARG="--context=$FAULTTEST_K8S_CONTEXT"
        NS="helpdesk-test"
        LOG="/var/lib/postgresql/data/log/postgresql.log"
        POD=$(kubectl $CTX_ARG get pod -n "$NS" -l app=postgres \
          -o jsonpath='{.items[0].metadata.name}')
        [ -z "$POD" ] && { echo "No postgres pod found in $NS" >&2; exit 1; }
        TS=$(kubectl $CTX_ARG exec -n "$NS" "$POD" -- \
          date -u '+%Y-%m-%d %H:%M:%S.000 UTC' 2>/dev/null \
          || date -u '+%Y-%m-%d %H:%M:%S.000 UTC')
        # Write PANIC lines to the on-disk postgres log file (logging_collector=on).
        # The pgdata volume persists across pod restarts so the entries remain
        # readable via read_pod_file on the new pod after the crash.
        kubectl $CTX_ARG exec -n "$NS" "$POD" -- bash -c "
          mkdir -p \$(dirname $LOG)
          echo '${TS} [1] FATAL:  could not write to file \"pg_wal/000000010000000000000001\": No space left on device' >> $LOG
          echo '${TS} [1] PANIC:  could not write to file \"pg_wal/000000010000000000000001\": No space left on device' >> $LOG
          echo '${TS} [1] LOG:    startup process (PID 1) was terminated by signal 9: Killed' >> $LOG
        "
        # Send SIGQUIT (fast shutdown) to the postmaster. kubectl exec returns
        # non-zero when the pod dies, so suppress that error.
        # PostgreSQL exits cleanly (exit code 0, reason=Completed) — this matches
        # a real PANIC scenario where postgres performs an emergency shutdown.
        kubectl $CTX_ARG exec -n "$NS" "$POD" -- bash -c \
          'kill -QUIT $(head -1 /var/lib/postgresql/data/postmaster.pid)' || true
        echo "PANIC lines written to $LOG and postmaster sent SIGQUIT (exit code 0)"
      wait: 15s   # allow K8s to record pod termination before prompting the agent
    teardown:
      type: shell_exec
      script_inline: |
        CTX_ARG=""
        [ -n "$FAULTTEST_K8S_CONTEXT" ] && CTX_ARG="--context=$FAULTTEST_K8S_CONTEXT"
        # StatefulSet controller auto-restarts the pod; just wait for healthy state.
        kubectl $CTX_ARG rollout status statefulset/postgres \
          -n helpdesk-test --timeout=90s
    prompt: >
      The database pod in namespace helpdesk-test is not responding.
      Please investigate what caused the crash and identify the root cause.
    evaluation:
      expected_tools:
        - get_pods
        - read_pod_file
      expected_keywords:
        any_of:
          - "FINDINGS:"
          - "pg_wal"
          - "WAL"
          - "disk"
          - "space"
          - "No space left"
          - "PANIC"
      expected_diagnosis:
        category: "wal_disk_full"
        narrative: >
          The agent should find that the pod restarted (reason=Completed,
          exitCode=0 — postgres emergency shutdown), notice get_pod_logs returns
          empty (logging_collector=on redirects output to a file), then call
          read_pod_file on the on-disk log to find the PANIC lines, and
          correctly diagnose WAL disk exhaustion.
    timeout: 90s
    remediation:
      agent_name: k8s
      agent_prompt: "The PostgreSQL pod in namespace helpdesk-test crashed due to WAL disk exhaustion (PANIC: No space left on device in pg_wal). The pod should have been restarted by Kubernetes. Please confirm the pod is running and the database is accepting connections again."
      verify_sql: "SELECT 1"
      verify_timeout: "120s"

  - id: db-wal-stale-slot
    name: "WAL accumulation — stale replication slot"
    category: database
    severity: high
    diagnosis_playbook_series_id: pbs_wal_stale_slot
    description: >
      A physical replication slot was created for a standby that has since been
      decommissioned. With nothing consuming the slot, PostgreSQL cannot recycle
      WAL segments behind restart_lsn — the pg_wal directory grows without bound.
      The database remains fully operational until the volume fills. Three other
      causes produce the same symptom (archive failure, long transaction, write
      volume), so the agent must work through a hypothesis tree rather than
      jumping to the slot explanation.
    inject:
      type: sql
      script_inline: |
        SELECT pg_create_physical_replication_slot('old_standby', true);
        CREATE TABLE IF NOT EXISTS _wal_gen (id serial, val text);
        INSERT INTO _wal_gen (val)
          SELECT md5(i::text) FROM generate_series(1, 10000) AS i;
    teardown:
      type: sql
      script_inline: |
        SELECT pg_drop_replication_slot(slot_name)
          FROM pg_replication_slots
         WHERE slot_name = 'old_standby' AND active = false;
        DROP TABLE IF EXISTS _wal_gen;
    external_compat: true
    external_inject:
      type: sql
      script_inline: |
        SELECT pg_create_physical_replication_slot('old_standby', true);
        CREATE TABLE IF NOT EXISTS _wal_gen (id serial, val text);
        INSERT INTO _wal_gen (val)
          SELECT md5(i::text) FROM generate_series(1, 10000) AS i;
    external_teardown:
      type: sql
      script_inline: |
        SELECT pg_drop_replication_slot(slot_name)
          FROM pg_replication_slots
         WHERE slot_name = 'old_standby' AND active = false;
        DROP TABLE IF EXISTS _wal_gen;
    prompt: >
      Storage monitoring is alerting on the PostgreSQL data volume for
      '{{connection_string}}': the pg_wal directory is consuming an unusually
      large and still-growing amount of disk space. The database itself appears
      healthy — queries are succeeding normally. Please investigate why WAL is
      accumulating and identify the root cause.
    evaluation:
      expected_tools:
        - get_replication_status
      expected_keywords:
        any_of:
          - "old_standby"
          - "stale slot"
          - "replication slot"
          - "inactive"
          - "lag_bytes"
          - "restart_lsn"
          - "slot"
      expected_diagnosis:
        category: "wal_accumulation_stale_slot"
        narrative: >
          The agent should work through the WAL accumulation hypothesis tree:
          rule out archive failure (call get_pg_settings category=wal_archiving,
          find archive_mode=off), then call get_replication_status and find the
          inactive slot 'old_standby' with lag_bytes > 0. It should correctly
          identify this as a stale replication slot, not a disk configuration
          issue or write volume problem, and propose dropping the slot with
          operator approval before recommending any checkpoint or max_wal_size
          tuning.
    timeout: 90s
    remediation:
      playbook_id: pbs_stale_slot_remediate
      verify_sql: "SELECT count(*) = 0 FROM pg_replication_slots WHERE slot_name = 'old_standby'"
      verify_timeout: "30s"

  - id: db-checkpoint-warning
    name: "Checkpoint warnings — bgwriter overload"
    category: database
    severity: medium
    diagnosis_playbook_series_id: pbs_checkpoint_bgwriter_triage
    prerequisites: |
      CNPG only: ALTER SYSTEM is disabled by default, and pg_reload_conf() is
      blocked for non-operator connections even with pg_signal_backend granted.
      The external_inject uses `kubectl exec pg_ctl reload` to work around this.

      Before:
        kubectl patch cluster <cluster-name> -n <namespace> --type merge \
          -p '{"spec":{"postgresql":{"enableAlterSystem":true}}}'

        PostgreSQL 18+: grant per-parameter ALTER SYSTEM privileges —
          GRANT ALTER SYSTEM ON PARAMETER bgwriter_lru_maxpages TO <app-user>;
          GRANT ALTER SYSTEM ON PARAMETER checkpoint_warning TO <app-user>;
          GRANT pg_checkpoint TO <app-user>;  -- required by CHECKPOINT

        PostgreSQL ≤ 17: no parameter-level GRANT ALTER SYSTEM; pass a
          superuser DSN via --conn and use --agent-conn for the app-user alias.

        Set env vars for the inject script (Helm: faulttest.extraEnv):
          CNPG_CLUSTER=<cluster-name>   (default: pg-cluster-minkube)
          CNPG_NAMESPACE=<namespace>    (default: db)

        Ensure the faulttest job service account has pods/exec create in
        the CNPG namespace (the Helm chart's faulttest.targetNamespace RBAC
        already grants this when faulttest.rbac.create=true).

      After:
        PostgreSQL 18+:
          REVOKE ALTER SYSTEM ON PARAMETER bgwriter_lru_maxpages FROM <app-user>;
          REVOKE ALTER SYSTEM ON PARAMETER checkpoint_warning FROM <app-user>;
          REVOKE pg_checkpoint FROM <app-user>;
        kubectl patch cluster <cluster-name> -n <namespace> --type merge \
          -p '{"spec":{"postgresql":{"enableAlterSystem":false}}}'

      Other operators (Crunchy, Zalando, StackGres, KubeDB) and standalone
      PostgreSQL do not require any of these steps.
    description: >
      bgwriter_lru_maxpages is set to 2 (default: 100), so the background
      writer hits its per-round page limit on every wakeup cycle
      (maxwritten_clean > 0) and backends must write dirty pages themselves
      (buffers_backend climbs). checkpoint_warning is set to 10s, so two rapid
      manual checkpoints 1 second apart cause PostgreSQL to emit LOG:
      "checkpoints are occurring too frequently (1 second apart)". The database
      stays available but query latency increases due to bgwriter starvation and
      elevated backend I/O. max_wal_size is left at its default (1 GB) — the
      checkpoint warnings come from the short checkpoint_warning threshold, not
      from WAL fill.
    inject:
      type: sql
      script_inline: |
        ALTER SYSTEM SET bgwriter_lru_maxpages = 2;
        ALTER SYSTEM SET checkpoint_warning = '10s';
        DO $$ BEGIN PERFORM pg_reload_conf(); EXCEPTION WHEN insufficient_privilege THEN NULL; END $$;
        CREATE TABLE IF NOT EXISTS _chkpt_gen (id serial, val text);
        INSERT INTO _chkpt_gen (val) SELECT md5(i::text) FROM generate_series(1,100000) AS i;
        SELECT pg_sleep(1);
        INSERT INTO _chkpt_gen (val) SELECT md5(i::text) FROM generate_series(1,100000) AS i;
        SELECT pg_sleep(1);
        INSERT INTO _chkpt_gen (val) SELECT md5(i::text) FROM generate_series(1,100000) AS i;
        SELECT pg_sleep(2);
        CHECKPOINT;
        SELECT pg_sleep(1);
        CHECKPOINT;
      wait: 30s
    teardown:
      type: sql
      script_inline: |
        ALTER SYSTEM RESET bgwriter_lru_maxpages;
        ALTER SYSTEM RESET checkpoint_warning;
        DO $$ BEGIN PERFORM pg_reload_conf(); EXCEPTION WHEN insufficient_privilege THEN NULL; END $$;
        DROP TABLE IF EXISTS _chkpt_gen;
    external_compat: true
    external_inject:
      type: shell_exec
      script_inline: |
        set -e
        # ALTER SYSTEM: writes settings to postgresql.auto.conf.
        psql "$FAULTTEST_CONN" -v ON_ERROR_STOP=1 <<'PSQL'
        ALTER SYSTEM SET bgwriter_lru_maxpages = 2;
        ALTER SYSTEM SET checkpoint_warning = '10s';
        PSQL
        # Reload config: pg_reload_conf() works on standalone Postgres and CNPG
        # with a superuser DSN. Fall back to kubectl exec for CNPG restricted users.
        if psql "$FAULTTEST_CONN" -v ON_ERROR_STOP=1 -c "SELECT pg_reload_conf();" 2>/dev/null; then
          echo "Config reloaded via pg_reload_conf()"
        else
          CLUSTER="${CNPG_CLUSTER:-pg-cluster-minkube}"
          NS="${CNPG_NAMESPACE:-db}"
          POD=$(kubectl get pod -n "$NS" \
            -l "cnpg.io/cluster=${CLUSTER},role=primary" \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n "$NS" "$POD" -c postgres -- \
            sh -c 'pg_ctl reload -D "$PGDATA"'
          echo "Config reloaded via kubectl"
        fi
        sleep 2
        # Workload: generates dirty pages and triggers checkpoint warnings.
        psql "$FAULTTEST_CONN" -v ON_ERROR_STOP=1 <<'PSQL'
        CREATE TABLE IF NOT EXISTS _chkpt_gen (id serial, val text);
        INSERT INTO _chkpt_gen (val) SELECT md5(i::text) FROM generate_series(1,100000) AS i;
        SELECT pg_sleep(1);
        INSERT INTO _chkpt_gen (val) SELECT md5(i::text) FROM generate_series(1,100000) AS i;
        SELECT pg_sleep(1);
        INSERT INTO _chkpt_gen (val) SELECT md5(i::text) FROM generate_series(1,100000) AS i;
        SELECT pg_sleep(2);
        CHECKPOINT;
        SELECT pg_sleep(1);
        CHECKPOINT;
        PSQL
      wait: 30s
    external_teardown:
      type: shell_exec
      script_inline: |
        set -e
        psql "$FAULTTEST_CONN" -v ON_ERROR_STOP=1 <<'PSQL'
        ALTER SYSTEM RESET bgwriter_lru_maxpages;
        ALTER SYSTEM RESET checkpoint_warning;
        DROP TABLE IF EXISTS _chkpt_gen;
        PSQL
        if psql "$FAULTTEST_CONN" -v ON_ERROR_STOP=1 -c "SELECT pg_reload_conf();" 2>/dev/null; then
          echo "Config reloaded via pg_reload_conf()"
        else
          CLUSTER="${CNPG_CLUSTER:-pg-cluster-minkube}"
          NS="${CNPG_NAMESPACE:-db}"
          POD=$(kubectl get pod -n "$NS" \
            -l "cnpg.io/cluster=${CLUSTER},role=primary" \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n "$NS" "$POD" -c postgres -- \
            sh -c 'pg_ctl reload -D "$PGDATA"'
          echo "Config reloaded via kubectl"
        fi
    prompt: >
      Performance monitoring is showing elevated write latency on
      '{{connection_string}}' and the PostgreSQL log has warning messages about
      checkpoints occurring too frequently. The database is still accepting
      queries but response times are degraded. Please investigate the checkpoint
      and background-writer health and identify what is causing the warnings.
    evaluation:
      expected_tools:
        - get_bgwriter_stats
      expected_keywords:
        any_of:
          - "FINDINGS:"
          - "checkpoint"
          - "too frequently"
          - "bgwriter"
          - "maxwritten_clean"
          - "buffers_backend"
          - "bgwriter_lru_maxpages"
          - "checkpoint_warning"
      expected_diagnosis:
        category: "checkpoint_bgwriter_overload"
        narrative: >
          The agent should call get_bgwriter_stats and observe that
          maxwritten_clean > 0 (bgwriter is throttled — it hits bgwriter_lru_maxpages
          on every wakeup cycle and stops) and buffers_backend elevated (backends
          are writing dirty pages themselves because bgwriter cannot keep up).
          It should call read_pg_log and find the "checkpoints are occurring too
          frequently" warning, then call get_pg_settings with category=bgwriter
          to find bgwriter_lru_maxpages = 2 (default 100) as the root cause.
          max_wal_size is at its default 1 GB — the checkpoint warning is triggered
          by the short checkpoint_warning threshold (10s), not by WAL fill.
          The agent should identify bgwriter_lru_maxpages = 2 as the primary root
          cause and recommend raising it to at least 100 (default) or higher.
    timeout: 90s
    remediation:
      playbook_id: pbs_bgwriter_remediate
      verify_sql: |
        SELECT (SELECT setting FROM pg_settings WHERE name = 'bgwriter_lru_maxpages') = '100'
      verify_timeout: "30s"

apiVersion: v1
kind: Pod
metadata:
  name: postgres-pvc-test
  namespace: helpdesk-test
  labels:
    app: postgres-pvc-test
spec:
  containers:
    - name: postgres
      image: postgres:16
      env:
        - name: POSTGRES_PASSWORD
          value: testpass
      volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: postgres-bad-pvc

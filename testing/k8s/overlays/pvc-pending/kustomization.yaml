apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This overlay scales the postgres StatefulSet to 0 replicas so that
# postgres-0 is terminated before the pending pod is created.  That way
# the agent finds only one pod in the namespace (the pending one) and is
# not distracted by the normally-running postgres-0.
# It also adds a PVC that references a nonexistent StorageClass (which can
# never be provisioned) and a Pod that claims it.  The Pod stays Pending
# because its volume cannot be bound.  On teardown, kustomize-delete removes
# all three resources and restoring the base brings replicas back to 1.

resources:
  - ../../base
  - pvc.yaml
  - pod.yaml

patches:
  - path: patch-sts.yaml
    target:
      kind: StatefulSet
      name: postgres

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helpdesk.fullname" . }}-gateway
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
      {{- if or .Values.gateway.identity.usersConfig .Values.gateway.identity.usersSecret }}
      annotations:
        # Force a rollout whenever the users Secret content changes so the
        # gateway picks up new API key hashes without a manual restart.
        checksum/users-secret: {{ include (print $.Template.BasePath "/users-secret.yaml") . | sha256sum }}
      {{- end }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/gateway"]
          env:
            - name: HELPDESK_GATEWAY_ADDR
              value: "0.0.0.0:{{ .Values.gateway.port }}"
            - name: HELPDESK_AGENT_URLS
              value: {{ include "helpdesk.agentURLs" . | quote }}
            {{- if .Values.infrastructure }}
            - name: HELPDESK_INFRA_CONFIG
              value: /etc/helpdesk/infrastructure.json
            {{- end }}
            {{- include "helpdesk.modelEnv" . | nindent 12 }}
            {{- include "helpdesk.logLevelEnv" . | nindent 12 }}
            {{- if .Values.governance.auditd.enabled }}
            - name: HELPDESK_AUDIT_ENABLED
              value: "true"
            - name: HELPDESK_AUDIT_URL
              value: "http://{{ include "helpdesk.fullname" . }}-auditd:{{ .Values.governance.auditd.port }}"
            {{- end }}
            {{- if .Values.gateway.agentAPIKeySecret }}
            - name: HELPDESK_AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.agentAPIKeySecret }}
                  key: {{ .Values.gateway.agentAPIKeyKey }}
            {{- end }}
            {{- if ne .Values.gateway.identity.provider "none" }}
            - name: HELPDESK_IDENTITY_PROVIDER
              value: {{ .Values.gateway.identity.provider | quote }}
            {{- end }}
            {{- if or .Values.gateway.identity.usersConfig .Values.gateway.identity.usersSecret }}
            - name: HELPDESK_USERS_FILE
              value: /etc/helpdesk/users.yaml
            {{- end }}
            {{- if .Values.gateway.identity.jwt.jwksURL }}
            - name: HELPDESK_JWT_JWKS_URL
              value: {{ .Values.gateway.identity.jwt.jwksURL | quote }}
            {{- end }}
            {{- if .Values.gateway.identity.jwt.issuer }}
            - name: HELPDESK_JWT_ISSUER
              value: {{ .Values.gateway.identity.jwt.issuer | quote }}
            {{- end }}
            {{- if .Values.gateway.identity.jwt.audience }}
            - name: HELPDESK_JWT_AUDIENCE
              value: {{ .Values.gateway.identity.jwt.audience | quote }}
            {{- end }}
            {{- if .Values.gateway.identity.jwt.rolesClaim }}
            - name: HELPDESK_JWT_ROLES_CLAIM
              value: {{ .Values.gateway.identity.jwt.rolesClaim | quote }}
            {{- end }}
            {{- if .Values.gateway.identity.jwt.cacheTTL }}
            - name: HELPDESK_JWT_CACHE_TTL
              value: {{ .Values.gateway.identity.jwt.cacheTTL | quote }}
            {{- end }}
          {{- if or .Values.infrastructure (or .Values.gateway.identity.usersConfig .Values.gateway.identity.usersSecret) }}
          volumeMounts:
            {{- if .Values.infrastructure }}
            - name: config
              mountPath: /etc/helpdesk/infrastructure.json
              subPath: infrastructure.json
              readOnly: true
            {{- end }}
            {{- if or .Values.gateway.identity.usersConfig .Values.gateway.identity.usersSecret }}
            - name: users
              mountPath: /etc/helpdesk/users.yaml
              subPath: users.yaml
              readOnly: true
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/agents
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/agents
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if or .Values.infrastructure (or .Values.gateway.identity.usersConfig .Values.gateway.identity.usersSecret) }}
      volumes:
        {{- if .Values.infrastructure }}
        - name: config
          configMap:
            name: {{ include "helpdesk.fullname" . }}-config
            items:
              - key: infrastructure.json
                path: infrastructure.json
        {{- end }}
        {{- if or .Values.gateway.identity.usersConfig .Values.gateway.identity.usersSecret }}
        - name: users
          secret:
            secretName: {{ if .Values.gateway.identity.usersSecret }}{{ .Values.gateway.identity.usersSecret }}{{ else }}{{ include "helpdesk.fullname" . }}-users{{ end }}
            items:
              - key: users.yaml
                path: users.yaml
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helpdesk.fullname" . }}-gateway
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helpdesk.fullname" . }}-incident-agent
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: incident-agent
spec:
  replicas: {{ .Values.agents.incident.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: incident-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: incident-agent
    spec:
      containers:
        - name: incident-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/incident-agent"]
          env:
            - name: HELPDESK_AGENT_ADDR
              value: "0.0.0.0:{{ .Values.agents.incident.port }}"
            - name: HELPDESK_AGENT_URL
              value: "http://{{ include "helpdesk.fullname" . }}-incident-agent:{{ .Values.agents.incident.port }}"
            - name: HELPDESK_INCIDENT_DIR
              value: /data/incidents
            {{- include "helpdesk.modelEnv" . | nindent 12 }}
            {{- if .Values.governance.auditd.enabled }}
            - name: HELPDESK_AUDIT_ENABLED
              value: "true"
            - name: HELPDESK_AUDIT_URL
              value: "http://{{ include "helpdesk.fullname" . }}-auditd:{{ .Values.governance.auditd.port }}"
            {{- end }}
            {{- if .Values.governance.policy.enabled }}
            - name: HELPDESK_POLICY_ENABLED
              value: "true"
            - name: HELPDESK_POLICY_FILE
              value: /etc/helpdesk/policies.yaml
            {{- end }}
            {{- if .Values.governance.approvals.enabled }}
            - name: HELPDESK_APPROVAL_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.governance.approvals.timeout }}
            - name: HELPDESK_APPROVAL_TIMEOUT
              value: "{{ .Values.governance.approvals.timeout }}"
            {{- end }}
            {{- if .Values.governance.policy.requirePurposeForSensitive }}
            - name: HELPDESK_REQUIRE_PURPOSE_FOR_SENSITIVE
              value: "true"
            {{- end }}
            {{- if .Values.infrastructure }}
            - name: HELPDESK_INFRA_CONFIG
              value: /etc/helpdesk/infrastructure.json
            {{- end }}
            {{- include "helpdesk.identityEnv" . | nindent 12 }}
            {{- include "helpdesk.operatingModeEnv" . | nindent 12 }}
            {{- include "helpdesk.logLevelEnv" . | nindent 12 }}
          ports:
            - name: a2a
              containerPort: {{ .Values.agents.incident.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: a2a
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: a2a
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            {{- if .Values.agents.incident.persistence.enabled }}
            - name: incidents
              mountPath: /data/incidents
            {{- end }}
            {{- if .Values.infrastructure }}
            - name: infra-config
              mountPath: /etc/helpdesk/infrastructure.json
              subPath: infrastructure.json
              readOnly: true
            {{- end }}
            {{- if .Values.governance.policy.enabled }}
            - name: policy-config
              mountPath: /etc/helpdesk/policies.yaml
              subPath: policies.yaml
              readOnly: true
            {{- end }}
            {{- include "helpdesk.usersVolumeMount" . | nindent 12 }}
      volumes:
        {{- if .Values.agents.incident.persistence.enabled }}
        - name: incidents
          persistentVolumeClaim:
            claimName: {{ include "helpdesk.fullname" . }}-incidents
        {{- end }}
        {{- if .Values.infrastructure }}
        - name: infra-config
          configMap:
            name: {{ include "helpdesk.fullname" . }}-config
        {{- end }}
        {{- if .Values.governance.policy.enabled }}
        - name: policy-config
          configMap:
            name: {{ required "governance.policy.configMap must be set when governance.policy.enabled is true" .Values.governance.policy.configMap }}
        {{- end }}
        {{- include "helpdesk.usersVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helpdesk.fullname" . }}-incident-agent
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: incident-agent
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.agents.incident.port }}
      targetPort: a2a
      protocol: TCP
      name: a2a
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: incident-agent
{{- if .Values.agents.incident.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "helpdesk.fullname" . }}-incidents
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: incident-agent
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.agents.incident.persistence.storageClass }}
  storageClassName: {{ .Values.agents.incident.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.agents.incident.persistence.size }}
{{- end }}

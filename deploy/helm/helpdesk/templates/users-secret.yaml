{{/*
Renders a Secret containing users.yaml when gateway.identity.usersConfig is set inline.
When gateway.identity.usersSecret is set instead, the Secret is managed out-of-band:

  kubectl create secret generic my-users \
    --from-file=users.yaml=./users.yaml

Then set:
  gateway.identity.usersSecret: my-users
*/}}
{{- if .Values.gateway.identity.usersConfig }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helpdesk.fullname" . }}-users
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
type: Opaque
stringData:
  users.yaml: {{ .Values.gateway.identity.usersConfig | quote }}
{{- end }}

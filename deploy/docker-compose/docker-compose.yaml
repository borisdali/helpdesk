name: helpdesk

services:
  # AI Governance: Audit daemon with approval workflows
  auditd:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/auditd"]
    environment:
      HELPDESK_LOG_LEVEL: ${HELPDESK_LOG_LEVEL:-info}
      # Core audit configuration
      HELPDESK_AUDIT_ADDR: "0.0.0.0:1199"
      HELPDESK_AUDIT_DB: /data/audit/audit.db
      HELPDESK_AUDIT_SOCKET: /data/audit/audit.sock
      # Set so that approvals/govexplain binaries exec'd inside this container
      # can find auditd without requiring -e or an explicit --url flag.
      HELPDESK_AUDIT_URL: http://localhost:1199
      # Policy (for governance info / govexplain endpoint).
      # Empty default: auditd loads the mounted policy file unconditionally so
      # that govexplain hypothetical checks work out of the box.
      # Set HELPDESK_POLICY_ENABLED=false in .env to suppress loading entirely.
      HELPDESK_POLICY_ENABLED: ${HELPDESK_POLICY_ENABLED:-}
      HELPDESK_POLICY_FILE: /etc/helpdesk/policies.yaml
      # Infrastructure config — enables tag/sensitivity resolution in the
      # /v1/governance/explain endpoint without relying on caller-supplied values.
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      # Identity & access control for auditd endpoints (agents authenticate here)
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      # Approval notification (optional)
      HELPDESK_APPROVAL_WEBHOOK: ${HELPDESK_APPROVAL_WEBHOOK:-}
      HELPDESK_APPROVAL_BASE_URL: ${HELPDESK_APPROVAL_BASE_URL:-http://localhost:1199}
      # Email notifications (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      HELPDESK_EMAIL_FROM: ${HELPDESK_EMAIL_FROM:-}
      HELPDESK_EMAIL_TO: ${HELPDESK_EMAIL_TO:-}
    volumes:
      - audit-data:/data/audit
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${HELPDESK_POLICY_FILE_HOST:-./policies.example.yaml}:/etc/helpdesk/policies.yaml:ro
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
    ports:
      - "1199:1199"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1199/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  database-agent:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/database-agent"]
    environment:
      HELPDESK_AGENT_ADDR: "0.0.0.0:1100"
      HELPDESK_AGENT_URL: "http://database-agent:1100"
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      # AI Governance
      HELPDESK_OPERATING_MODE: ${HELPDESK_OPERATING_MODE:-}
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${DB_AGENT_API_KEY:-}
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      HELPDESK_POLICY_ENABLED: ${HELPDESK_POLICY_ENABLED:-false}
      HELPDESK_POLICY_FILE: /etc/helpdesk/policies.yaml
      HELPDESK_APPROVAL_ENABLED: ${HELPDESK_APPROVAL_ENABLED:-false}
      HELPDESK_APPROVAL_TIMEOUT: ${HELPDESK_APPROVAL_TIMEOUT:-5m}
      HELPDESK_REQUIRE_PURPOSE_FOR_SENSITIVE: ${HELPDESK_REQUIRE_PURPOSE_FOR_SENSITIVE:-false}
      # Post-mutation verification retry tuning (optional)
      HELPDESK_VERIFY_MAX_ATTEMPTS: ${HELPDESK_VERIFY_MAX_ATTEMPTS:-}
      HELPDESK_VERIFY_INITIAL_DELAY_S: ${HELPDESK_VERIFY_INITIAL_DELAY_S:-}
      HELPDESK_VERIFY_MAX_DELAY_S: ${HELPDESK_VERIFY_MAX_DELAY_S:-}
      # Optional: set PGPASSWORD in .env as a single global DB password.
      # This is not secure and not recommended for anything beyond
      # throw-away development databases.
      # For per-host credentials mount a .pgpass file via PGPASSFILE below.
      PGPASSWORD: ${PGPASSWORD:-}
    volumes:
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
      - ${HELPDESK_POLICY_FILE_HOST:-./policies.example.yaml}:/etc/helpdesk/policies.yaml:ro
      - ${PGPASSFILE:-./.pgpass}:/root/.pgpass:ro
    ports:
      - "1100:1100"
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy

  k8s-agent:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/k8s-agent"]
    environment:
      HELPDESK_AGENT_ADDR: "0.0.0.0:1102"
      HELPDESK_AGENT_URL: "http://k8s-agent:1102"
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      # AI Governance
      HELPDESK_OPERATING_MODE: ${HELPDESK_OPERATING_MODE:-}
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${K8S_AGENT_API_KEY:-}
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      HELPDESK_POLICY_ENABLED: ${HELPDESK_POLICY_ENABLED:-false}
      HELPDESK_POLICY_FILE: /etc/helpdesk/policies.yaml
      HELPDESK_APPROVAL_ENABLED: ${HELPDESK_APPROVAL_ENABLED:-false}
      HELPDESK_APPROVAL_TIMEOUT: ${HELPDESK_APPROVAL_TIMEOUT:-5m}
      HELPDESK_REQUIRE_PURPOSE_FOR_SENSITIVE: ${HELPDESK_REQUIRE_PURPOSE_FOR_SENSITIVE:-false}
      # Post-mutation verification retry tuning (optional)
      HELPDESK_VERIFY_MAX_ATTEMPTS: ${HELPDESK_VERIFY_MAX_ATTEMPTS:-}
      HELPDESK_VERIFY_INITIAL_DELAY_S: ${HELPDESK_VERIFY_INITIAL_DELAY_S:-}
      HELPDESK_VERIFY_MAX_DELAY_S: ${HELPDESK_VERIFY_MAX_DELAY_S:-}
    volumes:
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
      - ${HELPDESK_POLICY_FILE_HOST:-./policies.example.yaml}:/etc/helpdesk/policies.yaml:ro
    ports:
      - "1102:1102"
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy

  sysadmin-agent:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/sysadmin-agent"]
    environment:
      HELPDESK_AGENT_ADDR: "0.0.0.0:1103"
      HELPDESK_AGENT_URL: "http://sysadmin-agent:1103"
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      # AI Governance
      HELPDESK_OPERATING_MODE: ${HELPDESK_OPERATING_MODE:-}
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${SYSADMIN_AGENT_API_KEY:-}
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      HELPDESK_POLICY_ENABLED: ${HELPDESK_POLICY_ENABLED:-false}
      HELPDESK_POLICY_FILE: /etc/helpdesk/policies.yaml
      HELPDESK_APPROVAL_ENABLED: ${HELPDESK_APPROVAL_ENABLED:-false}
      HELPDESK_APPROVAL_TIMEOUT: ${HELPDESK_APPROVAL_TIMEOUT:-5m}
    volumes:
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
      - ${HELPDESK_POLICY_FILE_HOST:-./policies.example.yaml}:/etc/helpdesk/policies.yaml:ro
      # Mount the Docker socket so the agent can inspect and manage containers on the host.
      # Required for databases managed via Docker/Podman. Remove if not applicable.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "1103:1103"
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy

  incident-agent:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/incident-agent"]
    environment:
      HELPDESK_AGENT_ADDR: "0.0.0.0:1104"
      HELPDESK_AGENT_URL: "http://incident-agent:1104"
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      HELPDESK_INCIDENT_DIR: /data/incidents
      # AI Governance
      HELPDESK_OPERATING_MODE: ${HELPDESK_OPERATING_MODE:-}
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${INCIDENT_AGENT_API_KEY:-}
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      HELPDESK_POLICY_ENABLED: ${HELPDESK_POLICY_ENABLED:-false}
      HELPDESK_POLICY_FILE: /etc/helpdesk/policies.yaml
      HELPDESK_APPROVAL_ENABLED: ${HELPDESK_APPROVAL_ENABLED:-false}
      HELPDESK_APPROVAL_TIMEOUT: ${HELPDESK_APPROVAL_TIMEOUT:-5m}
    volumes:
      - incidents:/data/incidents
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro
      - ${HELPDESK_POLICY_FILE_HOST:-./policies.example.yaml}:/etc/helpdesk/policies.yaml:ro
    ports:
      - "1104:1104"
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy

  # Research agent for Gemini models - provides web search via GoogleSearch.
  # GoogleSearch cannot be combined with function declarations, so this agent
  # handles web searches separately. Harmless to run with Anthropic models.
  research-agent:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/research-agent"]
    environment:
      HELPDESK_AGENT_ADDR: "0.0.0.0:1106"
      HELPDESK_AGENT_URL: "http://research-agent:1106"
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      # AI Governance
      HELPDESK_OPERATING_MODE: ${HELPDESK_OPERATING_MODE:-}
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${RESEARCH_AGENT_API_KEY:-}
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      HELPDESK_POLICY_ENABLED: ${HELPDESK_POLICY_ENABLED:-false}
      HELPDESK_POLICY_FILE: /etc/helpdesk/policies.yaml
      HELPDESK_APPROVAL_ENABLED: ${HELPDESK_APPROVAL_ENABLED:-false}
      HELPDESK_APPROVAL_TIMEOUT: ${HELPDESK_APPROVAL_TIMEOUT:-5m}
    volumes:
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${HELPDESK_POLICY_FILE_HOST:-./policies.example.yaml}:/etc/helpdesk/policies.yaml:ro
    ports:
      - "1106:1106"
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy

  gateway:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/gateway"]
    environment:
      HELPDESK_GATEWAY_ADDR: "0.0.0.0:8080"
      HELPDESK_AGENT_URLS: "http://database-agent:1100,http://k8s-agent:1102,http://sysadmin-agent:1103,http://incident-agent:1104,http://research-agent:1106"
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      # AI Governance - enables /api/v1/governance endpoints
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${GATEWAY_API_KEY:-}
      # Bearer token sent to agent /tool/{name} endpoints (required when agents enforce inbound auth)
      HELPDESK_AGENT_API_KEY: ${HELPDESK_AGENT_API_KEY:-}
      # Identity & access (optional; defaults to "none" — unverified X-User headers)
      HELPDESK_IDENTITY_PROVIDER: ${HELPDESK_IDENTITY_PROVIDER:-none}
      HELPDESK_USERS_FILE: /etc/helpdesk/users.yaml
      HELPDESK_JWT_JWKS_URL: ${HELPDESK_JWT_JWKS_URL:-}
      HELPDESK_JWT_ISSUER: ${HELPDESK_JWT_ISSUER:-}
      HELPDESK_JWT_AUDIENCE: ${HELPDESK_JWT_AUDIENCE:-}
      HELPDESK_JWT_ROLES_CLAIM: ${HELPDESK_JWT_ROLES_CLAIM:-}
      HELPDESK_JWT_CACHE_TTL: ${HELPDESK_JWT_CACHE_TTL:-}
    volumes:
      - ${HELPDESK_USERS_FILE_HOST:-./users.example.yaml}:/etc/helpdesk/users.yaml:ro
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      auditd:
        condition: service_healthy
      database-agent:
        condition: service_started
      k8s-agent:
        condition: service_started
      sysadmin-agent:
        condition: service_started
      incident-agent:
        condition: service_started
      research-agent:
        condition: service_started

  orchestrator:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command: ["/usr/local/bin/helpdesk"]
    environment:
      HELPDESK_AGENT_URLS: "http://database-agent:1100,http://k8s-agent:1102,http://sysadmin-agent:1103,http://incident-agent:1104,http://research-agent:1106"
      HELPDESK_MODEL_VENDOR: ${HELPDESK_MODEL_VENDOR}
      HELPDESK_MODEL_NAME: ${HELPDESK_MODEL_NAME}
      HELPDESK_API_KEY: ${HELPDESK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      # Streaming mode: "sse" (streaming) or "none" (disabled, default)
      # Set to "none" to work around ADK REPL bug in containers
      HELPDESK_STREAMING_MODE: ${HELPDESK_STREAMING_MODE:-none}
      # Session-level purpose: injects an explicit purpose into every delegation.
      # Equivalent to X-Purpose: <value> on API requests. Required when policies
      # use allowed_purposes conditions (e.g., pii-data-protection). Set in .env.
      HELPDESK_SESSION_PURPOSE: ${HELPDESK_SESSION_PURPOSE:-}
      # AI Governance
      HELPDESK_OPERATING_MODE: ${HELPDESK_OPERATING_MODE:-}
      HELPDESK_AUDIT_ENABLED: "true"
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_AUDIT_API_KEY: ${ORCHESTRATOR_API_KEY:-}
    volumes:
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
    stdin_open: true
    tty: true
    profiles:
      - interactive
    depends_on:
      - database-agent
      - k8s-agent
      - sysadmin-agent
      - incident-agent
      - research-agent

  # Authenticated gateway CLI — for operators and scripts.
  # Run with: docker compose run --rm helpdesk-client
  # One-shot:  docker compose run --rm helpdesk-client --agent database --message "is prod-db healthy?"
  helpdesk-client:
    image: helpdesk:latest
    entrypoint: ["/usr/local/bin/helpdesk-client"]
    working_dir: /jobs
    environment:
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_GATEWAY_URL: http://gateway:8080
      HELPDESK_CLIENT_USER: ${HELPDESK_CLIENT_USER:-}
      HELPDESK_CLIENT_API_KEY: ${HELPDESK_CLIENT_API_KEY:-}
      HELPDESK_SESSION_PURPOSE: ${HELPDESK_SESSION_PURPOSE:-}
      HELPDESK_SESSION_PURPOSE_NOTE: ${HELPDESK_SESSION_PURPOSE_NOTE:-}
      HELPDESK_CLIENT_AGENT: ${HELPDESK_CLIENT_AGENT:-database}
    volumes:
      - ${FLEET_JOBS_DIR:-./jobs}:/jobs
    stdin_open: true
    tty: true
    profiles:
      - interactive
    depends_on:
      - gateway

  # Fleet runner: applies a single change across infrastructure targets with staged rollout.
  # Usage: docker compose --profile fleet run --rm fleet-runner --job-file health-check.json
  # Dry-run: docker compose --profile fleet run --rm fleet-runner --job-file health-check.json --dry-run
  # Job files are read from ./jobs/ (or $FLEET_JOBS_DIR) on the host, which is also
  # where --plan-fleet-job writes them from the helpdesk-client container.
  fleet-runner:
    image: helpdesk:latest
    entrypoint: ["/usr/local/bin/fleet-runner"]
    working_dir: /jobs
    environment:
      HELPDESK_GATEWAY_URL: http://gateway:8080
      HELPDESK_AUDIT_URL: http://auditd:1199
      HELPDESK_CLIENT_API_KEY: ${FLEET_RUNNER_API_KEY:-}
      HELPDESK_INFRA_CONFIG: /etc/helpdesk/infrastructure.json
      HELPDESK_SESSION_PURPOSE: fleet_rollout
    volumes:
      - ${HELPDESK_INFRA_CONFIG:-./infrastructure.json}:/etc/helpdesk/infrastructure.json:ro
      - ${FLEET_JOBS_DIR:-./jobs}:/jobs
    profiles:
      - fleet
    depends_on:
      - gateway
      - auditd

  # AI Governance: Real-time audit monitoring and alerting
  # Enable with: docker compose --profile governance up -d
  auditor:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command:
      - /usr/local/bin/auditor
      - -socket=/data/audit/audit.sock
      - -webhook=${HELPDESK_ALERT_WEBHOOK:-}
    environment:
      HELPDESK_LOG_LEVEL: ${HELPDESK_LOG_LEVEL:-info}
      HELPDESK_AUDITOR_LOG_ALL: ${HELPDESK_AUDITOR_LOG_ALL:-false}
      # Email alerting (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      HELPDESK_EMAIL_FROM: ${HELPDESK_EMAIL_FROM:-}
      HELPDESK_EMAIL_TO: ${HELPDESK_EMAIL_TO:-}
    volumes:
      - audit-data:/data/audit:ro
    profiles:
      - governance
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy

  # AI Governance: Compliance reporter (one-shot, run with: docker compose run govbot)
  # Enable with: docker compose --profile governance run govbot
  govbot:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command:
      - /usr/local/bin/govbot
      - -gateway=http://gateway:8080
      - -since=${GOVBOT_SINCE:-24h}
      - -webhook=${GOVBOT_WEBHOOK:-}
    environment:
      # Compliance history: govbot POSTs run snapshots to auditd so no PVC is needed.
      HELPDESK_AUDIT_URL: http://auditd:1199
    profiles:
      - governance
    depends_on:
      auditd:
        condition: service_healthy
      gateway:
        condition: service_healthy

  # AI Governance: Security responder bot
  # Enable with: docker compose --profile governance up -d
  secbot:
    build:
      context: ../../..
      dockerfile: helpdesk/Dockerfile
    image: helpdesk:latest
    command:
      - /usr/local/bin/secbot
      - -socket=/data/audit/audit.sock
      - -gateway=http://gateway:8080
    volumes:
      - audit-data:/data/audit:ro
    ports:
      - "9091:9091"
    profiles:
      - governance
    restart: unless-stopped
    depends_on:
      auditd:
        condition: service_healthy
      gateway:
        condition: service_healthy

volumes:
  incidents:
  audit-data:

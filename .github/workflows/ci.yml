name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone adk-go
        run: |
          mkdir -p ../ADK/github
          git clone --depth=1 https://github.com/google/adk-go ../ADK/github/adk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        # agents/incident has pre-existing test failures unrelated to this codebase.
        run: |
          go test -v -coverprofile=unit.out -covermode=atomic \
            $(go list ./... | grep -v helpdesk/agents/incident) \
            2>&1 | tee /tmp/unit.log
          grep -E "^(ok |FAIL)" /tmp/unit.log

      - name: Helm tests
        run: make test-helm

      - name: Governance integration tests
        run: make integration-governance GOTEST_EXTRA="-coverprofile=gov.out -covermode=atomic"

      - name: Integration tests
        run: make integration GOTEST_EXTRA="-coverprofile=integration.out -covermode=atomic"

      - name: Merge coverage profiles
        run: |
          echo "mode: atomic" > coverage.out
          grep -h -v "^mode:" unit.out gov.out integration.out >> coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: /tmp/*.log
          retention-days: 7

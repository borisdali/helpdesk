name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.12.0)'
        required: true
        type: string
      create_github_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout helpdesk
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone adk-go
        run: |
          mkdir -p ../ADK/github
          git clone --depth=1 --branch v0.6.0 https://github.com/google/adk-go ../ADK/github/adk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch image
        run: make push VERSION=${{ inputs.version }}

      - name: Cross-compile binaries
        run: make binaries VERSION=${{ inputs.version }}

      - name: Build deploy bundle
        run: make bundle VERSION=${{ inputs.version }}

      - name: Create GitHub Release
        if: inputs.create_github_release
        run: |
          git tag -f ${{ inputs.version }}
          git push --force origin refs/tags/${{ inputs.version }}
          gh release delete ${{ inputs.version }} --yes || true
          gh release create ${{ inputs.version }} dist/*.tar.gz \
            --title "${{ inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

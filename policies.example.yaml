# Example of aiHelpDesk AI Governance Policy Configuration.
# Copy this to /etc/helpdesk/policies.yaml or set HELPDESK_POLICY_FILE.
version: "1"

policies:
  # Protect production databases
  - name: production-database-protection
    description: Restrict operations on production databases
    priority: 100  # Higher priority = evaluated first

    resources:
      - type: database
        match:
          tags: [production]

    rules:
      # Read operations are always allowed
      - action: read
        effect: allow

      # Write operations require approval and have row limits
      - action: write
        effect: allow
        conditions:
          require_approval: true
          max_rows_affected: 1000

      # Destructive operations are blocked
      - action: destructive
        effect: deny
        message: "Destructive operations on production databases are prohibited. Contact DBA team."

  # Change freeze during business hours
  - name: business-hours-freeze
    description: No changes during peak business hours
    priority: 90

    resources:
      - type: database
        match:
          tags: [production]
      - type: kubernetes
        match:
          tags: [production]

    rules:
      - action: [write, destructive]
        effect: deny
        conditions:
          schedule:
            days: [mon, tue, wed, thu, fri]
            hours: [9, 10, 11, 12, 13, 14, 15, 16, 17]  # 9am-5pm
            timezone: America/New_York
        message: "Changes not allowed during business hours (9am-5pm ET). Schedule for maintenance window."

  # DBA team privileges
  - name: dba-privileges
    description: DBAs can perform write operations on any database
    priority: 80

    principals:
      - role: dba
      - user: alice@example.com  # Lead DBA

    resources:
      - type: database

    rules:
      - action: [read, write]
        effect: allow
      - action: destructive
        effect: allow
        conditions:
          require_approval: true
          approval_quorum: 2  # Requires 2 DBAs to approve

  # Protect Kubernetes system namespaces
  - name: k8s-system-protection
    description: Protect Kubernetes system namespaces
    priority: 100

    resources:
      - type: kubernetes
        match:
          namespace: kube-system
      - type: kubernetes
        match:
          namespace: kube-public

    rules:
      - action: read
        effect: allow
      - action: [write, destructive]
        effect: deny
        message: "System namespaces are read-only"

  # Allow SRE team full access to staging
  - name: sre-staging-access
    description: SRE team has full access to staging environment
    priority: 70

    principals:
      - role: sre

    resources:
      - type: database
        match:
          tags: [staging]
      - type: kubernetes
        match:
          tags: [staging]

    rules:
      - action: [read, write, destructive]
        effect: allow

  # Default policy for development environments
  - name: development-permissive
    description: Development environments are permissive
    priority: 10

    resources:
      - type: database
        match:
          tags: [development]
      - type: kubernetes
        match:
          tags: [development]

    rules:
      - action: [read, write]
        effect: allow
      - action: destructive
        effect: allow
        conditions:
          require_approval: false  # No approval needed in dev

  # Fleet runner: staged rollout of changes across infrastructure targets.
  # Reads are always allowed. Writes to production require approval.
  # Destructive operations are denied regardless.
  - name: fleet-runner-policy
    description: Fleet runner staged rollout policy
    priority: 65

    principals:
      - service: fleet-runner

    resources:
      - type: database
        match:
          tags: [production]

    rules:
      - action: read
        effect: allow
      - action: write
        effect: allow
        conditions:
          require_approval: true
          max_rows_affected: 10000  # Fleet changes bounded by row limit
          allowed_purposes: [fleet_rollout, remediation]
        message: "Fleet write to production requires approval."
      - action: destructive
        effect: deny
        message: "Fleet runner cannot perform destructive operations on production databases."

  # Automated service accounts
  - name: automated-services
    description: Restrict automated service accounts
    priority: 60

    principals:
      - service: srebot
      - service: secbot

    resources:
      - type: database
      - type: kubernetes

    rules:
      - action: read
        effect: allow
      - action: write
        effect: allow
        conditions:
          require_approval: true
          max_rows_affected: 100  # Automated changes limited to 100 rows
      - action: destructive
        effect: deny
        message: "Automated services cannot perform destructive operations"

  # ── Identity & Access: sensitivity-based policies ────────────────────────────
  # Resources are tagged with sensitivity classes in infra.yaml:
  #   db_servers:
  #     prod-customers:
  #       sensitivity: [pii, critical]

  # Protect PII data: only diagnostic/compliance reads, no writes without approval
  - name: pii-data-protection
    description: Restrict access to resources containing personally identifiable information
    priority: 110

    resources:
      - type: database
        match:
          sensitivity: [pii]

    rules:
      # Reads require a declared purpose; block anonymous reads of PII data
      - action: read
        effect: allow
        conditions:
          allowed_purposes: [diagnostic, compliance, remediation, emergency]
        message: "PII data access requires a declared purpose. Use X-Purpose header."

      # Writes to PII databases always require approval
      - action: write
        effect: allow
        conditions:
          require_approval: true
          allowed_purposes: [remediation, compliance, emergency]
        message: "Write access to PII databases requires approval and a declared purpose."

      # Destructive operations on PII data are prohibited
      - action: destructive
        effect: deny
        message: "Destructive operations on PII databases are prohibited. Contact DBA + Legal."

  # Critical infrastructure: only emergency or maintenance purpose allows writes
  - name: critical-infra-write-guard
    description: Writes to critical resources require explicit maintenance or emergency purpose
    priority: 105

    resources:
      - type: database
        match:
          sensitivity: [critical]
      - type: kubernetes
        match:
          sensitivity: [critical]

    rules:
      - action: read
        effect: allow
      - action: write
        effect: allow
        conditions:
          allowed_purposes: [maintenance, emergency, remediation]
          require_approval: true
        message: "Writes to critical resources require maintenance or emergency purpose."
      - action: destructive
        effect: deny
        conditions:
          blocked_purposes: [diagnostic]
        message: "Destructive actions on critical resources are not allowed for diagnostic purposes."

  # ── Identity & Access: purpose-based break-glass override ────────────────────
  # Emergency break-glass: SRE on-call can bypass approval with emergency purpose.
  # Audited at highest priority so it runs before any deny rule.
  - name: emergency-break-glass
    description: SRE on-call can perform any action with emergency purpose (fully audited)
    priority: 200  # Highest priority — evaluated before any other policy

    principals:
      - role: oncall
      - role: sre

    resources:
      - type: database
      - type: kubernetes

    rules:
      - action: [read, write, destructive]
        effect: allow
        conditions:
          allowed_purposes: [emergency]
        message: "Emergency break-glass: action allowed and fully audited."

  # ── Identity & Access: purpose-based diagnostic restriction ──────────────────
  # Diagnostic-purpose requests should never perform writes.
  - name: diagnostic-readonly-enforcement
    description: Requests with diagnostic purpose are restricted to read-only operations
    priority: 95

    resources:
      - type: database
      - type: kubernetes

    rules:
      - action: [write, destructive]
        effect: deny
        conditions:
          blocked_purposes: [diagnostic]
        message: "Diagnostic purpose is read-only. Use 'remediation' purpose for write operations."

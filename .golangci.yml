version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        # database/sql iteration and cleanup — errors unactionable in defer/early-return
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        # network connections — if dial succeeds, close errors are unactionable
        - (net.Conn).Close
        - (*net.TCPConn).Close
        - (*net.UDPConn).Close
        # HTTP server lifecycle — ListenAndServe blocks until shutdown; Shutdown after context cancel
        - (*net/http.Server).ListenAndServe
        - (*net/http.Server).ListenAndServeTLS
        - (*net/http.Server).Shutdown
        # Diagnostic writes: stderr, tabwriter, http.ResponseWriter.
        # If the connection drops or the terminal is gone, there's nothing to do.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - (*text/tabwriter.Writer).Flush
        # Temp-dir cleanup in defer: best-effort, not actionable on error.
        - os.RemoveAll

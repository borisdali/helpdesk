version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        # database/sql iteration and cleanup — errors unactionable in defer/early-return
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        # internal audit store — used in every test file; close errors unactionable in defer/cleanup
        - (*helpdesk/internal/audit.Store).Close
        # file, network, and stream close — errors in defer are unactionable
        - (*os.File).Close
        - (io.ReadCloser).Close
        - (net.Conn).Close
        - (*net.TCPConn).Close
        - (*net.UDPConn).Close
        # archive/compression writers and readers
        - (*compress/gzip.Writer).Close
        - (*compress/gzip.Reader).Close
        - (*archive/tar.Writer).Close
        # multipart writer — finalises boundary; error unactionable in test helpers
        - (*mime/multipart.Writer).Close
        # HTTP server lifecycle
        - (*net/http.Server).ListenAndServe
        - (*net/http.Server).ListenAndServeTLS
        - (*net/http.Server).Shutdown
        # JSON encoding to http.ResponseWriter — connection drops are unactionable
        - (*encoding/json.Encoder).Encode
        # Diagnostic / formatting writes and scans
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Sscanf
        - fmt.Sscan
        - (*text/tabwriter.Writer).Flush
        # net.Conn deadline setting — unactionable if it fails
        - (net.Conn).SetReadDeadline
        - (net.Conn).SetWriteDeadline
        - (net.Conn).SetDeadline
        # http.ResponseWriter.Write in test handlers — connection drops unactionable
        - (net/http.ResponseWriter).Write
        # json.Unmarshal best-effort extraction (fallback paths, test handlers)
        - encoding/json.Unmarshal
        # env cleanup in tests — Unsetenv errors unactionable
        - os.Unsetenv
        # Filesystem operations: best-effort writes/cleanup, not actionable on error
        - os.Remove
        - os.RemoveAll
        - os.WriteFile
        - (*os.File).WriteString
        # io.Copy to pipes/buffers in test helpers — errors unactionable
        - io.Copy
